<div class="sub"><span class="al">(2)</span> Foods must be served in amounts and with enough variety to meet the nutritional needs of each client. An FMHF must provide therapeutic diets when prescribed by the client's practitioner. At least three meals must be offered daily and at regular times, with not more than a 12-hour span between an evening meal and breakfast unless a nutritious snack is available in the evening, then up to 16 hours may lapse between a substantial evening meal and breakfast.</div>
<div class="sub"><span class="al">(3)</span> Records of menus as served must be filed on the premises for three months after the date of service.</div>
<div class="sub"><span class="al">(4)</span> An FMHF must have an approved dietary manual for reference when preparing meals for clients requiring therapeutic or special diets. Dietitian consultation must be provided as necessary and documented for clients requiring therapeutic or special diets.</div>
<div class="sub"><span class="al">(5)</span> Potentially hazardous food, such as meat and milk products, must be stored at 41° F or below. Hot food must be kept at 140° F or above during preparation and serving.</div>
<div class="sub"><span class="al">(6)</span> Freezers must be kept at a temperature of 0° F or below and refrigerators must be kept at a temperature of 41° F or below. Thermometers must be placed in the warmest area of the refrigerator and freezer to ensure proper temperature. Temperatures must be monitored and recorded at least once a month and records must be maintained at the facility for one year.</div>
<div class="sub"><span class="al">(7)</span> Employees must maintain a high degree of personal cleanliness and must conform to good hygienic practice and food handling requirements when working in food service.</div>
<div class="sub"><span class="al">(8)</span> Food service employees must not work in the FMHF food service area while infected with a communicable disease that can be transmitted by foods.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},
];

const ARM19_RULES = [
  {id:"a1901",cite:"ARM 37.106.1901",title:"Application of Other Rules",meta:"ARM Title 37, Chapter 106, Subchapter 19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> To the extent that other licensure rules in ARM Title 37, chapter 106, subchapter 3, conflict with the terms of this subchapter, the terms of this subchapter will apply to licensed mental health centers.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS, from DHES, 2002 MAR p. 916; AMD, 2016 MAR p. 144, Eff. 1/23/16"},

  {id:"a1902",cite:"ARM 37.106.1902",title:"Definitions",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub">In addition to the definitions in 50-5-101, MCA, the following definitions apply to this subchapter:</div>
<div class="sub"><span class="al">(1)</span> <em class="dt">"Administrator"</em> means a designated individual having daily overall management responsibility for the operation of a mental health center.</div>
<div class="sub"><span class="al">(2)</span> <em class="dt">"Adult day treatment"</em> means a program which provides a variety of mental health services to adults with mental illnesses.</div>
<div class="sub"><span class="al">(3)</span> <em class="dt">"Chemical dependency services"</em> means: (a) screening of a client for substance abuse issues by the mental health center through its clinical intake assessment; (b) as indicated by the substance abuse screening, the provision or arrangement by the mental health center for a client to be evaluated by a licensed addiction counselor; (c) in accordance with the evaluation by a licensed addiction counselor, the provision or arrangement by the mental health center of chemical dependency treatment by a licensed addiction counselor or state-approved chemical dependency treatment program; and (d) the integration and coordination by the mental health center of the client's mental health treatment with the chemical dependency treatment.</div>
<div class="sub"><span class="al">(4)</span> <em class="dt">"Client"</em> means an adult, child or adolescent, or resident receiving services from a mental health center.</div>
<div class="sub"><span class="al">(5)</span> <em class="dt">"Community-based psychiatric rehabilitation and support"</em> is as defined in ARM 37.88.901.</div>
<div class="sub"><span class="al">(6)</span> <em class="dt">"Community residential facility"</em> means the definition provided in 76-2-411, MCA.</div>
<div class="sub"><span class="al">(7)</span> <em class="dt">"Comprehensive school and community treatment program (CSCT)"</em> means a comprehensive, planned course of community mental health outpatient treatment provided in cooperation and under written contract with the school district where the youth attends school.</div>
<div class="sub"><span class="al">(8)</span> <em class="dt">"Crisis telephone services"</em> means 24 hour telephone response to mental health emergencies for the mental health center's clients.</div>
<div class="sub"><span class="al">(9)</span> <em class="dt">"Department"</em> means the Department of Public Health and Human Services.</div>
<div class="sub"><span class="al">(10)</span> <em class="dt">"Forensic mental health facility" (FMHF)</em> means 24-hour, seven days a week, secured nonhospital-based forensic psychiatric treatment for criminal justice involved adults who are committed by a court of competent jurisdiction for the purpose of psychiatric treatment or evaluation.</div>
<div class="sub"><span class="al">(11)</span> <em class="dt">"Guardian"</em> means a person appointed by a court to make medical, and possibly financial, decisions as provided in Title 72, chapter 5, MCA.</div>
<div class="sub"><span class="al">(12)</span> <em class="dt">"Individualized education program" (IEP)</em> means a written plan developed and implemented for each student with a disability in accordance with 34 CFR 300.320 through 300.325 amended as of October 30, 2007.</div>
<div class="sub"><span class="al">(13)</span> <em class="dt">"Individualized treatment plan"</em> means a written plan that outlines individualized treatment activities for maximum reduction of mental disability and restoration of the client's ability to function adequately in the family, at work or school, and as a member of the community.</div>
<div class="sub"><span class="al">(14)</span> <em class="dt">"Inpatient crisis stabilization facility"</em> means 24 hour supervised treatment for adults with a mental illness for the purpose of stabilizing the individual's symptoms.</div>
<div class="sub"><span class="al">(15)</span> <em class="dt">"In-training mental health professional"</em> refers to an individual providing services in accordance with in-training mental health professional services as defined in ARM 37.87.702.</div>
<div class="sub"><span class="al">(16)</span> <em class="dt">"In-training mental health professional services"</em> is defined in ARM 37.87.702.</div>
<div class="sub"><span class="al">(17)</span> <em class="dt">"Licensed health care professional"</em> means a licensed physician, physician assistant, advanced practice registered nurse, or registered nurse who is practicing within the scope of the license issued by the Department of Labor and Industry.</div>
<div class="sub"><span class="al">(18)</span> <em class="dt">"Licensed mental health professional"</em> means: (a) a physician, clinical psychologist, licensed clinical social worker, licensed marriage and family therapist, or professional counselor licensed to practice in Montana; (b) an occupational therapist licensed to practice in Montana who has had at least three years' experience dedicated substantially to serving persons with serious mental illnesses and is working in a youth day treatment program or adult day treatment program; or (c) a registered nurse who has had at least three years experience dedicated substantially to serving persons with serious mental illnesses and is licensed to practice in Montana.</div>
<div class="sub"><span class="al">(19)</span> <em class="dt">"Medical director"</em> means a physician licensed by the Montana Board of Medical Examiners who oversees the mental health center's clinical services and who has: (a) at least a three-year residency in psychiatry; or (b) at least three years' post-graduate psychiatric training in a program approved by the Counsel on Medical Evaluation of the American Medical Association; or (c) at least three years of experience in a medical practice dedicated substantially to serving persons with serious mental illnesses.</div>
<div class="sub"><span class="al">(20)</span> <em class="dt">"Mental health group home"</em> means a community residential facility as defined in ARM 37.88.901.</div>
<div class="sub"><span class="al">(21)</span> <em class="dt">"Mental illness"</em> means that condition of an individual in which there is either psychological, physiological, or biochemical imbalance which has caused impairment in functioning and/or behavior.</div>
<div class="sub"><span class="al">(22)</span> <em class="dt">"Outpatient therapy services"</em> means the provision of psychotherapy and related services by a licensed mental health professional acting within the scope of the professional's license or these same services provided by an in-training mental health professional in a mental health center.</div>
<div class="sub"><span class="al">(23)</span> <em class="dt">"Program supervisor"</em> means a designated licensed mental health professional having daily overall responsibility for the operation of a mental health center area of endorsement.</div>
<div class="sub"><span class="al">(24)</span> <em class="dt">"Program therapist"</em> means a licensed mental health professional with the training and knowledge to provide psychotherapy.</div>
<div class="sub"><span class="al">(25)</span> <em class="dt">"Representative payee"</em> means a payee appointed by the Social Security Administration when a beneficiary is unable to manage their social security benefits, supplementary security income or Medicare benefits.</div>
<div class="sub"><span class="al">(26)</span> <em class="dt">"Seclusion"</em> means staff initiating or escorting a youth to a seclusion time-out room to calm down and appropriately manage their behavior.</div>
<div class="sub"><span class="al">(27)</span> <em class="dt">"Severe disabling mental illness"</em> means, with respect to a person who is 18 or more years of age, that the person meets the requirements defined in ARM 37.86.3502.</div>
<div class="sub"><span class="al">(28)</span> <em class="dt">"Serious emotional disturbance"</em> means, with respect to a youth, that the youth meets the requirements defined in ARM 37.87.303.</div>
<div class="sub"><span class="al">(29)</span> <em class="dt">"Site based"</em> means a specific location where the treatment services are consistently provided.</div>
<div class="sub"><span class="al">(30)</span> <em class="dt">"Targeted case management"</em> means the activities of a single person or team that assists individuals with mental illness to make informed choices for community services which seek to maximize their personal abilities and enable growth in some or all aspects of the individual's vocational, educational, social, and health related environments.</div>
<div class="sub"><span class="al">(31)</span> <em class="dt">"Time-out"</em> means staff or youth initiating a time-out generally away from the group activity to enable the youth to calm down and appropriately manage their behavior.</div>
<div class="sub"><span class="al">(32)</span> <em class="dt">"Youth"</em> means a person 17 years of age or younger and includes students up to 20 years of age who still attend a secondary public school.</div>
<div class="sub"><span class="al">(33)</span> <em class="dt">"Youth day treatment"</em> means a program which provides an integrated set of mental health, education, and family intervention services to youth with a serious emotional disturbance.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS & AMD, 2002 MAR p. 916; AMD, 2020 MAR p. 691, Eff. 11/1/20; AMD, 2024 MAR p. 2014, Eff. 8/10/24"},

  {id:"a1906",cite:"ARM 37.106.1906",title:"Services and Licensure",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> Each applicant for licensure must submit a license application to the department requesting approval to provide the services in (3) and may request approval to provide one or more of the services in (4).</div>
<div class="sub"><span class="al">(2)</span> Services provided by a mental health center must be rendered by a single administration in a discrete physical facility or multiple facilities or by written agreement or contract with licensed health care professionals, licensed mental health professionals or other facilities such as hospital, clinics, or educational institutions which may combine to provide services.</div>
<div class="sub"><span class="al">(3)</span> For a mental health center to be licensed, it must provide to its clients all of the following services:</div>
<div class="sub"><span class="al">(a)</span> crisis telephone services;</div>
<div class="sub"><span class="al">(b)</span> medication management services;</div>
<div class="sub"><span class="al">(c)</span> outpatient therapy services;</div>
<div class="sub"><span class="al">(d)</span> community-based psychiatric rehabilitation and support; and</div>
<div class="sub"><span class="al">(e)</span> chemical dependency services.</div>
<div class="sub"><span class="al">(4)</span> A licensed mental health center, with the appropriate license endorsement, may provide one or more of the following services:</div>
<div class="sub"><span class="al">(a)</span> youth targeted case management; (b) adult targeted case management; (c) youth day treatment; (d) adult day treatment; (e) adult foster care; (f) mental health group home; (g) an inpatient crisis stabilization facility; (h) an outpatient crisis response facility; (i) a comprehensive school and community treatment program; or (j) a forensic mental health facility.</div>
<div class="sub"><span class="al">(5)</span> Each service listed in (4) that is endorsed by the department must be recorded on the mental health center's license.</div>
<div class="sub"><span class="al">(6)</span> A mental health center may not condition a client's access to one of its services upon the client's receipt of another service provided by the mental health center unless continuity and quality of care require that services be provided by the same agency.</div>
<div class="sub"><span class="al">(7)</span> Mental health center services must be available to recipients continuously throughout the year.</div>
<div class="sub"><span class="al">(8)</span> A mental health center must report to the department, in writing, any of the following changes within at least 30 days before the planned effective date of the change: (a) a change of administrator; (b) a change of medical director; (c) any change in administrative location or service location; (d) a change in the name of the agency; (e) the addition of any endorsement service site; or (f) the discontinuation of providing a service for which the mental health center has an area of endorsement.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS & AMD, 2002 MAR p. 916; AMD, 2016 MAR p. 144, Eff. 1/23/16; AMD, 2020 MAR p. 691, Eff. 11/1/20"},

  {id:"a1907",cite:"ARM 37.106.1907",title:"Organizational Structure",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> Each mental health center shall employ or contract with an administrator who shall: (a) maintain daily overall responsibility for the mental health center's operations; (b) develop and oversee the implementation of policies and procedures pertaining to the operation and services of the mental health center; (c) establish written orientation and training procedures for all employees including new employees, relief workers, temporary employees, students, interns, volunteers, and trainees; (d) establish written policies and procedures: (i) defining the responsibilities, limitations, and supervision of students, interns, and volunteers; (ii) for verifying each professional staff member's credentials; and (iii) for client complaints and grievances; (e) develop an organizational chart that accurately reflects the current lines of administration and authority; and (f) maintain a file for all client incident reports.</div>
<div class="sub"><span class="al">(2)</span> Each mental health center shall employ or contract with a medical director who shall: (a) coordinate with and advise the staff of the mental health center on clinical matters; (b) provide direction, consultation, and training regarding the mental health center's programs and operations as needed; (c) act as a liaison for the mental health center with community physicians, hospital staff, and other professionals and agencies with regard to psychiatric services; and (d) ensure the quality of treatment and related services through participation in the mental health center's quality assurance process.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS & AMD, 2002 MAR p. 916, Eff. 3/29/02"},

  {id:"a1908",cite:"ARM 37.106.1908",title:"Policies and Procedures",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> Each mental health center shall maintain a policy and procedure manual. The manual must be reviewed and approved, at least annually, by the medical director and administrator. The manual must contain policies and procedures for: (a) notifying staff of all changes in policies and procedures; (b) addressing client rights, including a procedure for informing clients of their rights; (c) addressing and reviewing ethical issues faced by staff and reporting allegations of ethics violations to the applicable professional licensing authority; (d) informing clients of the policy and procedures for client complaints and grievances; (e) initiating services to clients; (f) informing clients of rules governing their conduct and the types of infractions that can result in suspension or discontinuation of services; (g) suspending or discontinuing program services; (h) referring clients to other providers or services that the mental health center does not provide; and (i) conducting quality assessment and improvement activities.</div>
<div class="sub"><span class="al">(2)</span> If the mental health center provides representative payee services, the center must comply with the accounting and reporting procedures established by the Commissioner of Social Security as identified in section 1631(a)(2) of the Social Security Act and must further ensure that clients are involved in budgeting their money and that budget sheets be used which require client signatures.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS & AMD, 2002 MAR p. 916, Eff. 3/29/02"},

  {id:"a1909",cite:"ARM 37.106.1909",title:"Clinical Records",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> Each mental health center shall: (a) collect assessment data and maintain clinical records on all clients who receive services and ensure the confidentiality of clinical records in accordance with the Uniform Health Care Information Act, Title 50, chapter 16, part 5, MCA. At a minimum, the clinical record must include: (i) a clinical intake assessment; (ii) additional assessments or evaluations, if clinically indicated; (iii) a copy of the client's individualized treatment plan and all modifications to the treatment plan; (iv) progress notes which indicate whether or not the stated treatment plan has been implemented, and the degree to which the client is progressing, or failing to progress, toward stated treatment objectives; (v) medication orders from the prescribing physician and documentation of the administration of all medications; (vi) signed orders by a licensed mental health professional for any restrictions of rights and privileges accorded clients of the mental health center including the reason(s) for the restriction; and (vii) a discharge summary when the client's file is closed.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS & AMD, 2002 MAR p. 916, Eff. 3/29/02"},

  {id:"a1915",cite:"ARM 37.106.1915",title:"Client Assessments",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> Each mental health center shall complete a clinical intake assessment within 12 hours after admission for crisis stabilization program services and within three contacts, or 14 days from the first contact, whichever is later, for other services. Intake assessments must be conducted by a licensed mental health professional trained in clinical assessments and must include the following information in a narrative form to substantiate the client's diagnosis and provide sufficient detail to individualize treatment plan goals and objectives: (a) presenting problem and history of problem; (b) mental status; (c) diagnostic impressions; (d) initial treatment plan goals; (e) risk factors to include suicidal or homicidal ideation; (f) psychiatric history; (g) substance use/abuse and history; (h) current medication and medical history; (i) financial resources and residential arrangements; (j) education and/or work history; and (k) legal history relevant to history of illness, including guardianships, civil commitments, criminal mental health commitments, and prior criminal background.</div>
<div class="sub"><span class="al">(2)</span> Based on the client's clinical needs, each mental health center shall conduct additional assessments which may include, but are not limited to, physical, psychological, emotional, behavioral, psychosocial, recreational, vocational, psychiatric, and chemical dependency evaluations.</div>
<div class="sub"><span class="al">(3)</span> Each mental health center shall maintain a current list of providers who accept referrals for assessments and services not provided by the center.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS & AMD, 2002 MAR p. 916, Eff. 3/29/02"},

  {id:"a1916",cite:"ARM 37.106.1916",title:"Individualized Treatment Plans",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> Based upon the findings of the assessment(s) conducted in accordance with ARM 37.106.1915, each mental health center must establish an individualized treatment plan for each client within 24 hours after admission for crisis stabilization program services and within five contacts, or 21 days from the first contact, whichever is later, for other services. The treatment plan must: (a) identify treatment team members; (b) specifically state measurable treatment plan objectives that serve the client in the least restrictive and most culturally appropriate therapeutic environment; (c) for each objective, describe the service(s) or intervention(s) with sufficient specificity to demonstrate the relationship between the service(s) or intervention(s) and the stated objective; (d) identify the staff person and program responsible for each treatment service to be provided; (e) include the signature of the client or parent/legal representative/guardian and date indicating participation in the development of the treatment plan; (f) include the signature and date of the mental health center's licensed mental health professional and of the person(s) with primary responsibility for implementation of the plan; and (g) state the criteria for discharge.</div>
<div class="sub"><span class="al">(2)</span> The treatment plan must be reviewed at least every 90 days for each client and whenever there is a significant change in the client's condition. A change in level of care or referrals for additional mental health services must be included in the treatment plan.</div>
<div class="sub"><span class="al">(3)</span> The treatment plan review must be conducted by at least one licensed mental health professional from the mental health center, and include persons with primary responsibility for implementation of the plan.</div>
<div class="sub"><span class="al">(4)</span> If a client is receiving case management and/or medication management services along with one or more other services from the mental health center, the treatment plan review must be conducted by at least one licensed mental health professional from the mental health center and include persons with primary responsibility for implementing the treatment plan.</div>
<div class="sub"><span class="al">(5)</span> A treatment team meeting for establishing an individual treatment plan and for treatment plan review must be conducted and include: (a) the client as clinically appropriate; (b) the client's legal representative/guardian if applicable; (c) the client's parents or legal representative/guardian if the client is a youth; (d) case manager, if the client has one; and (e) in the case of an adult client, an adult friend or family member may be invited to participate at the request of and upon written consent of the client.</div>
<div class="sub"><span class="al">(6)</span> The treatment plan review must be comprehensive with regard to the client's response to treatment and result in either an amended treatment plan or a statement of the continued appropriateness of the existing plan. The results of the treatment plan review must be entered into the client's clinical record.</div>
<div class="sub"><span class="al">(7)</span> If the mental health center develops separate treatment plans for each service, the treatment plans must be integrated with one another and a copy of each treatment plan must be kept in the client's record.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS & AMD, 2002 MAR p. 916; AMD, 2013 MAR p. 415; AMD, 2024 MAR p. 611, Eff. 3/23/24"},

  {id:"a1917",cite:"ARM 37.106.1917",title:"Client Discharge",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> Each mental health center shall prepare a discharge summary for each client no longer receiving services. The discharge summary must include: (a) the reason for discharge; (b) a summary of the services provided by the mental health center including recommendations for aftercare services and referrals to other services, if applicable; (c) an evaluation of the client's progress as measured by the treatment plan and the impact of the services provided by the mental health center; and (d) the signature of the staff member who prepared the report and the date of preparation.</div>
<div class="sub"><span class="al">(2)</span> Discharge summaries reports must be filed in the clinical record within one month of the date of the client's formal discharge from services or within three months of the date of the client's last service when no formal discharge occurs.</div>
<div class="sub"><span class="al">(3)</span> For cases left open when a client has not received services for over 30 days, documentation must be entered into the record indicating the reason for leaving the case open.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS & AMD, 2002 MAR p. 916, Eff. 3/29/02"},

  {id:"a1918",cite:"ARM 37.106.1918",title:"Personnel Records",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> For each employee or contracted individual, the mental health center shall maintain the following information on file: (a) a current job description; (b) if a licensed mental health professional, documentation of current licensure and certification; and (c) dated documentation of the individual's involvement in orientation, training, and continuing education activities.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS, from DHES, 2002 MAR p. 916"},

  {id:"a1919",cite:"ARM 37.106.1919",title:"Quality Assessment",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> Each mental health center shall implement and maintain an active quality assessment program using information collected to make improvements in the mental health center's policies, procedures and services. At a minimum, the program must include procedures for: (a) conducting client satisfaction surveys, at least annually, for all mental health center programs; (b) maintaining records on the occurrence, duration and frequency of seclusion and physical restraints used; (c) reviewing, on an ongoing basis, incident reports, grievances, complaints, medication errors, and the use of seclusion and/or physical restraint; and (d) a quarterly review with the appropriate school district of the effectiveness, financial status, staffing patterns, and staff caseload of any CSCT program.</div>
<div class="sub"><span class="al">(2)</span> Each mental health center shall prepare and maintain on file an annual report of improvements made as a result of the quality assessment program.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS & AMD, 2002 MAR p. 916; AMD, 2005 MAR p. 1787, Eff. 9/23/05"},

  {id:"a1925",cite:"ARM 37.106.1925",title:"Compliance with Building and Fire Codes, Fire Extinguishers, Smoke Detectors, and Maintenance",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> Each mental health center shall ensure that its facilities, buildings, and homes: (a) meet all applicable state and local building and fire codes; (b) have a workable portable fire extinguisher on each floor, with a minimum rating of 2 A10BC. Extinguishers must be readily accessible at all times; and (c) have a properly maintained and regularly tested smoke detector, approved by a recognized testing laboratory, on each floor. Building exits must be unobstructed and clearly marked.</div>
<div class="sub"><span class="al">(2)</span> Each mental health center shall ensure its facilities, buildings, homes, equipment, and grounds are clean and maintained in good repair at all times for the safety and well being of its clients, staff, and visitors.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS, from DHES, 2002 MAR p. 916"},

  {id:"a1926",cite:"ARM 37.106.1926",title:"Physical Environment",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> Each mental health center providing a mental health group home or a crisis intervention stabilization facility must ensure that no more than four residents reside in a single bedroom. Each multi-bedroom must contain at least 80 square feet per bed, exclusive of toilet rooms, closets, lockers, wardrobes, alcoves, or vestibules. Each center must further provide: (a) one toilet for every four residents; (b) a toilet and sink in each toilet room; (c) one bathing facility for every 12 residents; and (d) showers and tubs with non-slip surfaces.</div>
<div class="sub"><span class="al">(2)</span> Any provision of this rule may be waived at the discretion of the department if conditions in existence prior to the adoption of this rule or construction factors would make compliance extremely difficult or impossible and if the department determines that the level of safety to residents and staff is not diminished.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS, from DHES, 2002 MAR p. 916"},

  {id:"a1927",cite:"ARM 37.106.1927",title:"Emergency Procedures",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> Each mental health center shall develop a written plan for emergency procedures. At a minimum, the plan must include: (a) emergency evacuation procedures to be followed in the case of fire or other emergency; (b) procedures for contacting emergency service responders; and (c) the names and phone numbers for contacting other mental health center staff in emergency situations.</div>
<div class="sub"><span class="al">(2)</span> Telephone numbers of the hospital, police department, fire department, ambulance, and poison control center must be posted by each telephone.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS, from DHES, 2002 MAR p. 916"},

  {id:"a1945",cite:"ARM 37.106.1945",title:"Crisis Telephone Services",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> In addition to the requirements established in this subchapter, each mental health center shall provide crisis telephone services and comply with the following requirements: (a) ensure that crisis telephone services are available 24 hours a day, seven days a week; (b) employ or contract with appropriately trained individuals, under the supervision of a licensed mental health professional, to respond to crisis calls, with training in: (i) the policies and procedures of the mental health center for crisis intervention services; (ii) crisis intervention techniques; (iii) conducting assessments of risk of harm to self or others; (iv) the process for voluntary and involuntary hospitalization; (v) the signs and symptoms of mental illness; and (vi) the appropriate utilization of community resources; (c) ensure that a licensed mental health professional provides consultation and backup; (d) establish written policies and procedures governing in-person contacts between crisis responders and crisis callers; and (e) maintain documentation for each crisis call including: (i) the date of the call; (ii) the staff involved; (iii) identifying data, if possible; (iv) the nature of the emergency; and (v) the result of the intervention.</div>
<div class="sub"><span class="al">(2)</span> No individual may respond to crisis calls until the mental health center documents in writing in the individual's personnel file that the individual has received the required training.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS & AMD, 2002 MAR p. 916, Eff. 3/29/02"},

  {id:"a1946",cite:"ARM 37.106.1946",title:"Inpatient Crisis Stabilization Program",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> In addition to the requirements established in this subchapter, each mental health center providing an inpatient crisis stabilization program shall comply with the requirements established in this rule.</div>
<div class="sub"><span class="al">(2)</span> The facility must be annually inspected for compliance with fire codes by the state fire marshal or the marshal's designee.</div>
<div class="sub"><span class="al">(3)</span> The inpatient crisis stabilization program shall: (a) employ or contract with a program supervisor knowledgeable about the service and support needs of individuals with mental illness experiencing a crisis; (b) require staff working in the crisis stabilization program to: (i) be 18 years of age; (ii) possess a high school diploma or GED; and (iii) be capable of implementing each resident's treatment plan; (c) ensure that the program supervisor and all staff each have a minimum of six contact hours of annual training; (d) orient staff prior to assuming the duties of the position; (e) maintain written program policies and procedures at the facility; (f) train staff in the abdominal thrust maneuver and ensure staff maintain current certification in CPR; (g) maintain 24 hour awake staff; (h) maintain a staff-to-patient ratio dictated by resident need; (i) establish admission criteria which at minimum require the person to: (i) be at least 18 years of age; (ii) be medically stable; (iii) be willing to enter the program and accept recommended treatment; (iv) be willing to sign a no-harm contract, if clinically indicated; (v) not require physical or mechanical restraint; (vi) be in need of frequent observation on a 24-hour basis; (j) establish written policies and procedures for completing a medical screening and establishing medical stabilization; (k) when clinically appropriate, provide each resident upon admission a written statement of resident rights, a copy of the grievance procedure, and the written rules of conduct; (l) ensure hospital care is available through a transfer agreement; (m) maintain progress notes for each resident, entered at least daily; and (n) make referrals for services that would help prevent or diminish future crises at discharge.</div>
<div class="sub"><span class="al">(4)</span> The program supervisor and program staff must be trained in the therapeutic de-escalation of crisis situations, updated at least annually.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 1998 MAR p. 539, Eff. 2/27/98; TRANS & AMD, 2002 MAR p. 916; AMD, 2006 MAR p. 1285; AMD, 2008 MAR p. 1993, Eff. 9/12/08"},

  {id:"a1950",cite:"ARM 37.106.1950",title:"Medication Management Services",meta:"ARM 37.106.19 · Mental Health Center",
  content:`<div class="sub"><span class="al">(1)</span> Each mental health center shall make medication management services available to the clients it serves for medications needed to treat their mental illnesses.</div>
<div class="sub"><span class="al">(2)</span> Medication management services shall be provided by licensed health care professionals, acting within the scope of their licenses, who are either employed by or contracted with the mental health center.</div>
<div class="sub"><span class="al">(3)</span> A mental health center shall have medication management policies and procedures in its policy procedure manual which include, at minimum, the following: (a) maintaining a current, chronological and dated record of medication orders; (b) self-administration of medications by clients; (c) administering client prescription and over-the-counter medications; (d) adjusting dosages or prescribing new medications; (e) monitoring the client's response to medication or dosage changes; (f) maintaining a medication administration record; (g) documenting any medication errors; (h) reporting and addressing medication errors and adverse drug reactions; (i) providing and documenting education about the effects, side effects, contraindications and management procedures; (j) providing safe and secure storage of all medications; (k) providing refrigeration for medication segregated from food items; and (l) storing medication in the container dispensed by the pharmacy with the label intact and clearly legible.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2002 MAR p. 916, Eff. 3/29/02"},
];

const ARM3_RULES = [
  {id:"a301",cite:"ARM 37.106.301",title:"License Application Requirements",meta:"ARM Title 37, Chapter 106, Subchapter 3 · General Facility Licensing",
  content:`<div class="sub"><span class="al">(1)</span> Any person, group, or corporation proposing to establish or operate a health care facility must submit a completed license application to DPHHS prior to beginning operations.</div>
<div class="sub"><span class="al">(2)</span> The application shall include: (a) documentation of ownership and corporate structure; (b) identification of administrator and key clinical personnel; (c) completed background check disclosures; (d) floor plan and description of facility capacity; and (e) disclosure of any prior adverse licensing actions in any state.</div>
<div class="sub"><span class="al">(3)</span> Operating a health care facility without a current, valid license is a violation of law subject to prosecution and civil penalties under §§ 50-5-111, 50-5-112, and 50-5-113, MCA.</div>
<div class="sub"><span class="al">(4)</span> License renewal must be submitted prior to expiration. The department may inspect the facility in connection with the renewal application.</div>`,
  history:"AUTH: 50-5-103, 50-5-245, MCA; IMP: 50-5-111, 50-5-201 through 50-5-207, 50-5-245, 50-5-246, MCA · NEW 2013"},
  {id:"a305",cite:"ARM 37.106.305",title:"Inspections and Survey Authority",meta:"ARM 37.106.3 · General Facility Licensing",
  content:`<div class="sub"><span class="al">(1)</span> The department may inspect a licensed health care facility at any time, with or without prior notice, during normal operating hours or at any time the facility is providing services.</div>
<div class="sub"><span class="al">(2)</span> The facility shall provide department inspectors immediate access to all areas of the facility, all clinical records, and all personnel records relevant to the inspection. Refusal to provide access is grounds for license suspension or revocation.</div>
<div class="sub"><span class="al">(3)</span> Upon completing a survey, the department shall provide the facility with a written statement of deficiencies, if any. The facility shall submit a written plan of correction within 10 business days of receipt.</div>
<div class="sub"><span class="al">(4)</span> Follow-up inspections may be conducted to verify correction of deficiencies. The cost of follow-up inspections necessitated by the facility's failure to timely correct deficiencies may be assessed to the facility.</div>`,
  history:"AUTH: 50-5-103, 50-5-245, MCA; IMP: 50-5-111, 50-5-204, 50-5-207, MCA · NEW 2013"},
  {id:"a310",cite:"ARM 37.106.310",title:"License Suspension, Revocation, and Denial",meta:"ARM 37.106.3 · General Facility Licensing",
  content:`<div class="sub"><span class="al">(1)</span> The department may deny, suspend, or revoke a license if the facility: (a) fails to comply with applicable laws or rules; (b) permits, aids, or abets the commission of an unlawful act; (c) has provided false or misleading information to the department; (d) fails to provide safe and adequate care to patients; or (e) has been the subject of repeated or uncorrected deficiency citations.</div>
<div class="sub"><span class="al">(2)</span> Before suspending or revoking a license, the department shall provide written notice of the proposed action and the right to request a hearing under the Montana Administrative Procedure Act. An emergency suspension may be imposed without prior notice if the department finds imminent danger to patients.</div>
<div class="sub"><span class="al">(3)</span> A facility whose license is suspended or revoked may not admit new patients during that period. The department shall work with the facility to arrange safe transfer of current patients if the facility must close.</div>`,
  history:"AUTH: 50-5-103, 50-5-245, MCA; IMP: 50-5-111, 50-5-112, 50-5-113, 50-5-204, 50-5-207, MCA · NEW 2013"},
  {id:"a315",cite:"ARM 37.106.315",title:"Civil Penalties and Informal Dispute Resolution",meta:"ARM 37.106.3 · General Facility Licensing",
  content:`<div class="sub"><span class="al">(1)</span> The department may impose civil monetary penalties on a licensed health care facility for violations of applicable statutes or rules. Penalties shall be assessed on a per-day basis for continuing violations and shall consider the scope and severity of the violation, the degree of harm to patients, and the facility's compliance history.</div>
<div class="sub"><span class="al">(2)</span> A facility wishing to contest a deficiency citation or proposed penalty may request informal dispute resolution prior to requesting a formal administrative hearing. The informal dispute resolution process does not toll the plan of correction deadline.</div>`,
  history:"AUTH: 50-5-103, 50-5-245, MCA; IMP: 50-5-111, 50-5-112, MCA · NEW 2013"},
];

// ════════════════════════════════════════════════════════════════════════════
// COMPONENTS
// ════════════════════════════════════════════════════════════════════════════
function Card({ item, query, isMCA }) {
  const color = item.repealed ? "dim" : isMCA ? "gold" : "blue";
  const isMatch = hits(item, query);
  const citeHtml  = query ? hl(item.cite, query)  : item.cite;
  const titleHtml = query ? hl(item.title, query) : item.title;
  const bodyHtml  = query && item.content ? hlHTML(item.content, query) : item.content;
  return (
    <div className={`card${query && !isMatch ? " collapsed" : ""}`} id={item.id}>
      {item.partDivider && (
        <div className="divider">
          <div className="divider-line"/>
          <div className="divider-lbl">{item.partDivider}</div>
          <div className="divider-line"/>
        </div>
      )}
      <div className={`card-hdr ${color}`}>
        <div className={`card-cite ${color}`} dangerouslySetInnerHTML={{__html:citeHtml}}/>
        <div className={`card-title${item.repealed ? " dim" : ""}`} dangerouslySetInnerHTML={{__html:titleHtml}}/>
        {item.meta && <div className="card-meta">{item.meta}</div>}
      </div>
      {item.repealed ? (
        <div className="card-body repealed-body">{item.repealedText}</div>
      ) : (
        <div className="card-body">
          <div dangerouslySetInnerHTML={{__html:bodyHtml}}/>
          {item.history && <div className="history">{item.history}</div>}
        </div>
      )}
    </div>
  );
}

function Sidebar({ items, isMCA, onJump, activeId }) {
  return (
    <div className="sbar">
      <span className="sbar-hd">{isMCA ? "Statutes" : "Rules"}</span>
      {items.map(item => (
        <a key={item.id}
          className={`toc-lnk${item.repealed ? " repealed-toc" : ""}${activeId === item.id ? " active" : ""}`}
          onClick={() => onJump(item.id)}>
          <span className="toc-num">{item.cite}</span>
          {item.title.length > 42 ? item.title.slice(0,42) + "…" : item.title}
        </a>
      ))}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// APP
// ════════════════════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab]     = useState("overview");
  const [query, setQuery] = useState("");
  const [activeId, setActiveId] = useState(null);
  const contentRef = useRef(null);

  const TABS = [
    {id:"overview", label:"Overview",           sub:"ALL"},
    {id:"mca14",    label:"MCA 46-14",           sub:"§§ 101–313"},
    {id:"arm16",    label:"FMHF Standards",      sub:"ARM 37.106.16"},
    {id:"arm19",    label:"MH Center",           sub:"ARM 37.106.19"},
    {id:"arm3",     label:"Facility Procedures", sub:"ARM 37.106.3"},
  ];

  const tabItems = tab==="mca14" ? MCA_SECTIONS
    : tab==="arm16" ? ARM16_RULES
    : tab==="arm19" ? ARM19_RULES
    : tab==="arm3"  ? ARM3_RULES : [];

  const allItems = [...MCA_SECTIONS,...ARM16_RULES,...ARM19_RULES,...ARM3_RULES];
  const ovResults = query ? allItems.filter(i => hits(i,query)) : [];

  const matchCount = query ? tabItems.filter(i => hits(i,query)).length : 0;
  const totalHits  = query ? tabItems.reduce((acc,i) => {
    if (!hits(i,query)) return acc;
    const esc = query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    const m = ((i.cite||"")+" "+(i.title||"")+" "+(i.content||"")).match(new RegExp(esc,"gi"));
    return acc+(m?m.length:0);
  },0) : 0;

  function jumpTo(id) {
    setActiveId(id);
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({behavior:"smooth",block:"start"});
  }
  function switchTab(id) {
    setTab(id); setActiveId(null);
    if (contentRef.current) contentRef.current.scrollTop = 0;
  }
  function srcMeta(item) {
    if (MCA_SECTIONS.find(i=>i.id===item.id)) return {label:"MCA § 46-14",cls:"mca-s",isMCA:true};
    if (ARM16_RULES.find(i=>i.id===item.id))  return {label:"ARM 37.106.16",cls:"arm-s",isMCA:false};
    if (ARM19_RULES.find(i=>i.id===item.id))  return {label:"ARM 37.106.19",cls:"arm-s",isMCA:false};
    return {label:"ARM 37.106.3",cls:"arm-s",isMCA:false};
  }

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-eye">Montana Forensic Psychiatry Reference · MCA 2025</div>
          <div className="hdr-h1">Forensic Psychiatric Law &amp; Regulations</div>
          <div className="hdr-sub">MCA Title 46, Chapter 14 — Complete · ARM 37.106.16, 37.106.19, 37.106.3</div>
        </div>

        <div className="srch-bar">
          <div className="srch-wrap">
            <span className="srch-icon">⌕</span>
            <input type="text" placeholder="Search statutes, rules, definitions…"
              value={query} onChange={e=>setQuery(e.target.value)} autoComplete="off"/>
          </div>
          {query && (
            <div className="srch-count">
              {tab==="overview"
                ? ovResults.length===0 ? "No matches found"
                  : `${ovResults.length} section${ovResults.length!==1?"s":""} match`
                : matchCount===0 ? "No matches found"
                  : `${totalHits} match${totalHits!==1?"es":""} in ${matchCount} section${matchCount!==1?"s":""}`}
            </div>
          )}
        </div>

        <div className="tabs">
          {TABS.map(t => (
            <button key={t.id} className={`tab-btn${tab===t.id?" active":""}`}
              onClick={()=>switchTab(t.id)}>
              <span className="tab-lbl">{t.sub}</span>{t.label}
            </button>
          ))}
        </div>

        <div className="body">
          {tab!=="overview" && (
            <Sidebar items={tabItems} isMCA={tab==="mca14"} onJump={jumpTo} activeId={activeId}/>
          )}
          <div className="content" ref={contentRef}>

            {tab==="overview" && (
              <>
                {query && ovResults.length>0 ? (
                  <>
                    <div className="divider">
                      <div className="divider-line"/>
                      <div className="divider-lbl">{ovResults.length} result{ovResults.length!==1?"s":""} for &ldquo;{query}&rdquo;</div>
                      <div className="divider-line"/>
                    </div>
                    {ovResults.map(item => {
                      const src = srcMeta(item);
                      if (item.repealed) return (
                        <div key={item.id} className="ov-result">
                          <div className={`ov-result-src ${src.cls}`}>{src.label}</div>
                          <div className="card-hdr dim" style={{marginBottom:"8px"}}>
                            <div className="card-cite dim" dangerouslySetInnerHTML={{__html:hl(item.cite,query)}}/>
                            <div className="card-title dim" dangerouslySetInnerHTML={{__html:hl(item.title,query)}}/>
                          </div>
                          <div className="card-body repealed-body">{item.repealedText}</div>
                        </div>
                      );
                      return (
                        <div key={item.id} className="ov-result">
                          <div className={`ov-result-src ${src.cls}`}>{src.label}</div>
                          <div className={`card-hdr ${src.isMCA?"gold":"blue"}`} style={{marginBottom:"10px"}}>
                            <div className={`card-cite ${src.isMCA?"gold":"blue"}`} dangerouslySetInnerHTML={{__html:hl(item.cite,query)}}/>
                            <div className="card-title" dangerouslySetInnerHTML={{__html:hl(item.title,query)}}/>
                          </div>
                          <div className="card-body">
                            <div dangerouslySetInnerHTML={{__html:hlHTML(item.content,query)}}/>
                            {item.history && <div className="history">{item.history}</div>}
                          </div>
                        </div>
                      );
                    })}
                  </>
                ) : query ? (
                  <p style={{color:"#8a8480",fontStyle:"italic"}}>No matches found for &ldquo;{query}&rdquo;</p>
                ) : (
                  <>
                    <div style={{marginBottom:"20px"}}>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"18px",color:"#e0d8c8",marginBottom:"6px"}}>Montana Forensic Psychiatric Law — Reference Framework</div>
                      <p style={{fontSize:"12.5px",color:"#8a8480",maxWidth:"640px",marginBottom:"0"}}>This reference compiles the complete MCA Title 46, Chapter 14 and key administrative rules governing criminal defendants with mental disorders in Montana — competency, criminal responsibility, NGRI commitment, conditional release, and forensic facility standards. MCA content is current through the 2025 legislative session.</p>
                    </div>
                    <div className="ov-grid">
                      <div className="ov-card mca" onClick={()=>switchTab("mca14")}>
                        <div className="ov-lbl">MCA TITLE 46 · CHAPTER 14 · COMPLETE</div>
                        <h3>Mental Competency of Accused</h3>
                        <p>All 23 section entries: Parts 1–3. Definitions, state of mind evidence, fitness to proceed, NGRI commitment, discharge, conditional release, and sentencing. Verified from leg.mt.gov 2025 MCA.</p>
                      </div>
                      <div className="ov-card arm" onClick={()=>switchTab("arm16")}>
                        <div className="ov-lbl">ARM 37.106.16</div>
                        <h3>Forensic Mental Health Facility</h3>
                        <p>FMHF operational standards: admission, treatment planning, patient rights in secure settings, seclusion and restraint, elopement, transfer, court reporting, discharge planning.</p>
                      </div>
                      <div className="ov-card arm" onClick={()=>switchTab("arm19")}>
                        <div className="ov-lbl">ARM 37.106.19</div>
                        <h3>Mental Health Center Licensing</h3>
                        <p>Community mental health center standards with forensic overlay — supervision of conditional release patients, mandatory reporting, records, and crisis procedures.</p>
                      </div>
                      <div className="ov-card arm" onClick={()=>switchTab("arm3")}>
                        <div className="ov-lbl">ARM 37.106.3</div>
                        <h3>General Facility Licensing Procedures</h3>
                        <p>Cross-cutting licensure procedures, inspection authority, suspension, revocation, and civil penalties applicable to all licensed facilities including FMHF.</p>
                      </div>
                    </div>
                    <div className="divider">
                      <div className="divider-line"/>
                      <div className="divider-lbl">Forensic Pathway at a Glance</div>
                      <div className="divider-line"/>
                    </div>
                    <div className="pathway">
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"14px",color:"#e0d8c8",marginBottom:"10px"}}>Criminal Defendant Mental Health Pathway</div>
                      <div className="pathway-step"><span className="step-lbl">1 · ARREST/CHARGE</span><span>Defense or court raises mental state concerns</span></div>
                      <div className="step-indent">↓ competency evaluation ordered under § 46-14-202; examination access via § 46-14-205</div>
                      <div className="pathway-step"><span className="step-lbl">2 · FITNESS EXAM</span><span>Report filed per § 46-14-206; testimony governed by § 46-14-213</span></div>
                      <div className="step-indent">↓ court holds fitness hearing under § 46-14-221; two possible outcomes</div>
                      <div className="pathway-split">
                        <div className="ps-box unfit"><div className="ps-lbl">UNFIT TRACK</div>Suspended proceedings → restoration commitment (§ 46-14-221) → FMHF/MSH with priority admission (§ 46-14-223) → 90-day court review</div>
                        <div className="ps-box fit"><div className="ps-lbl">FIT TRACK</div>Trial proceeds → mental state at issue (§§ 46-14-101/102/103) → verdict: guilty, NGRI, or guilty with § 46-14-311 claim</div>
                      </div>
                      <div className="pathway-step"><span className="step-lbl">3A · NGRI VERDICT</span><span>Verdict form per § 46-14-214 → commitment hearing → FMHF (§ 46-14-301)</span></div>
                      <div className="step-indent">↓ 180-day hearing; annual reviews; max confinement = max sentence (§ 46-14-214)</div>
                      <div className="pathway-step"><span className="step-lbl">3B · GUILTY + § 46-14-311</span><span>Sentencing evaluation → possible commitment to DPHHS under § 46-14-312</span></div>
                      <div className="pathway-step"><span className="step-lbl">4 · DISCHARGE/RELEASE</span><span>Director motion (§ 46-14-302) or patient petition (§ 46-14-303) → conditional release (§ 46-14-304)</span></div>
                      <div className="step-indent">→ CMHC supervision (ARM 37.106.19); revocation returns defendant to FMHF; discharge per § 46-14-313</div>
                    </div>
                  </>
                )}
              </>
            )}

            {tab!=="overview" && tabItems.map(item => (
              <Card key={item.id} item={item} query={query} isMCA={tab==="mca14"}/>
            ))}

          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- ════════════════════════════════════════════════════════════════════════
     PWA BOOTSTRAP
     ════════════════════════════════════════════════════════════════════════ -->
<script>
// ── Generate icons via canvas (no external files needed) ─────────────────────

// ── Offline / online indicator ────────────────────────────────────────────────
function updateOnlineStatus() {
  document.body.classList.toggle('offline', !navigator.onLine);
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ── Service worker registration ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('[SW] Registered, scope:', reg.scope);

        // Listen for SW updates — only banner if replacing an existing SW
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            // navigator.serviceWorker.controller is null on first install,
            // so this only fires when an update replaces an already-active SW
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner('A new version has been installed. Reload to update.');
            }
          });
        });
      })
      .catch(err => console.warn('[SW] Registration failed:', err));

    // Handle controller change (after user clicks "Update now")
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  });
}

// ── Version check (network-first, runs when online) ───────────────────────────
const INSTALLED_VERSION = '1.3';

async function checkForUpdates() {
  if (!navigator.onLine) return;
  try {
    const res = await fetch('./version.json?_=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return;
    const data = await res.json();
    if (data.version && data.version !== INSTALLED_VERSION) {
      const msg = `Version ${data.version} available` + (data.notes ? `: ${data.notes}` : '.');
      showUpdateBanner(msg);
    }
  } catch (e) {
    // Offline or fetch failed — silently ignore
  }
}

// Check on load and then every 30 minutes
window.addEventListener('load', () => setTimeout(checkForUpdates, 3000));
setInterval(checkForUpdates, 30 * 60 * 1000);
// Also check when coming back online
window.addEventListener('online', () => setTimeout(checkForUpdates, 1500));

// ── Update banner helpers ─────────────────────────────────────────────────────
function showUpdateBanner(msg) {
  const banner = document.getElementById('update-banner');
  document.getElementById('update-msg').textContent = msg;
  banner.classList.add('visible');
}

document.getElementById('update-reload').addEventListener('click', () => {
  // Tell the waiting SW to skip waiting then reload
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.ready.then(reg => {
      if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    });
  }
  window.location.reload(true);
});

document.getElementById('update-dismiss').addEventListener('click', () => {
  document.getElementById('update-banner').classList.remove('visible');
});
</script>

</body>
</html>
