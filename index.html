// ════════════════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════════════════
function hl(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return text.replace(new RegExp(`(${esc})`, "gi"), '<span class="hl">$1</span>');
}
function hlHTML(html, q) {
  if (!q) return html;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return html.replace(new RegExp(`(${esc})(?![^<]*>)`, "gi"), '<span class="hl">$1</span>');
}
function hits(item, q) {
  if (!q) return true;
  return (item.cite + " " + item.title + " " + (item.content || "")).toLowerCase().includes(q.toLowerCase());
}

// ════════════════════════════════════════════════════════════════════════════
// DATA — MCA 46-14 (all verified from leg.mt.gov 2025 MCA)
// ════════════════════════════════════════════════════════════════════════════
const MCA_SECTIONS = [
  // ── PART 1 ──────────────────────────────────────────────────────────────
  {id:"s101",cite:"MCA § 46-14-101",title:"Mental Disease or Disorder — Purpose — Definition",meta:"Part 1. Relevance of Mental Disease or Disorder",partDivider:"Part 1 — Relevance of Mental Disease or Disorder",
  content:`<div class="sub"><span class="sl">(1)</span> The purpose of this section is to provide a legal standard of mental disease or disorder under which information gained from examination of the defendant, pursuant to Part 2 of this chapter, is applied. The court shall apply this standard: (a) in any determination regarding: (i) a defendant's fitness to proceed and stand trial; (ii) whether the defendant had, at the time the offense was committed, a particular state of mind that is an essential element of the offense; and (b) at sentencing when a defendant convicted on a verdict of guilty or a plea of guilty or nolo contendere claims the defendant was unable to appreciate the criminality of the defendant's behavior or to conform the defendant's behavior to the requirements of law.</div>
<div class="sub"><span class="sl">(2)(a)</span> As used in this chapter, <em class="dt">"mental disease or disorder"</em> means an organic, mental, or emotional disorder that is manifested by a substantial disturbance in behavior, feeling, thinking, or judgment to such an extent that the person requires care, treatment, and rehabilitation.</div>
<div class="sub"><span class="sl">(2)(b)</span> The term does not include but may co-occur with: (i) an abnormality manifested only by repeated criminal or other antisocial behavior; (ii) a developmental disability as defined in 53-20-102; (iii) drug or alcohol intoxication; or (iv) drug or alcohol addiction.</div>`,
  history:"En. 95-501, Ch. 196, L. 1967; amd. Ch. 184, L. 1977; amd. Ch. 713, L. 1979; amd. Ch. 800, L. 1991; amd. Ch. 595, L. 2003; amd. Ch. 209, L. 2013; amd. Sec. 10, Ch. 161, L. 2015"},

  {id:"s102",cite:"MCA § 46-14-102",title:"Evidence of Mental Disease or Disorder or Developmental Disability Admissible to Prove State of Mind",meta:"Part 1. Relevance of Mental Disease or Disorder",
  content:`<div class="sub">Evidence that the defendant suffered from a mental disease or disorder or developmental disability is admissible to prove that the defendant did or did not have a state of mind that is an element of the offense.</div>`,
  history:"En. 95-502, Ch. 196, L. 1967; amd. Ch. 800, L. 1991; amd. Ch. 452, L. 2003; amd. Sec. 11, Ch. 161, L. 2015"},

  {id:"s103",cite:"MCA § 46-14-103",title:"Mental Disease or Disorder or Developmental Disability Excluding Fitness to Proceed",meta:"Part 1. Relevance of Mental Disease or Disorder",
  content:`<div class="sub">A person who, as a result of mental disease or disorder or developmental disability, is unable to understand the proceedings against the person or to assist in the person's own defense may not be tried, convicted, or sentenced for the commission of an offense so long as the incapacity endures.</div>
<div class="note"><span class="nlbl">Cross-Reference</span>The procedural mechanism for determining and acting on fitness is in Part 2 — see <strong>§ 46-14-202</strong> (examination) and <strong>§ 46-14-221</strong> (determination of fitness and procedure on finding of unfitness).</div>`,
  history:"En. 95-504, Ch. 196, L. 1967; amd. Ch. 800, L. 1991; amd. Ch. 452, L. 2003; amd. Sec. 12, Ch. 161, L. 2015"},

  // ── PART 2 ──────────────────────────────────────────────────────────────
  {id:"s201",cite:"MCA § 46-14-201",title:"Renumbered 46-14-214",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",partDivider:"Part 2 — Procedure When Mental Disease or Disorder an Issue",repealed:true,repealedText:"Renumbered 46-14-214.",content:"",history:""},

  {id:"s202",cite:"MCA § 46-14-202",title:"Examination of Defendant — Commitment Procedures for Examination of Fitness — Expenses",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",
  content:`<div class="sub"><span class="sl">(1)</span> If the issue of a defendant's fitness to proceed is raised by the court, the prosecution, or the defendant, or if defense counsel files a written motion requesting examination, the court shall appoint at least one qualified psychiatrist, licensed clinical psychologist, or advanced practice registered nurse to examine and report upon the defendant's mental condition.</div>
<div class="sub"><span class="sl">(2)(a)</span> The court may order the defendant committed to a hospital, another suitable facility, or the Montana State Hospital for examination for a period not exceeding 60 days or a longer period the court determines necessary. The court may direct that an examiner retained by the defendant be permitted to witness and participate in the examination.</div>
<div class="sub"><span class="sl">(2)(b)</span> On commitment to MSH, the superintendent shall designate at least one qualified psychiatrist, licensed clinical psychologist, or APRN to report on the defendant's mental condition.</div>
<div class="sub"><span class="sl">(3)</span> Except as provided in § 46-14-206(2), a court ordering an examination may not require the report to include an opinion as to the capacity of the defendant to have a particular state of mind that is an element of the offense, or an opinion as to capacity to appreciate criminality or conform conduct.</div>
<div class="sub"><span class="sl">(4)</span> In the examination, any method accepted by the medical or psychological profession for examination of those alleged to be suffering from mental disease or disorder may be employed.</div>
<div class="sub"><span class="sl">(5)</span> Costs are allocated by who raised the issue: court/prosecution → office of court administrator; defendant → defendant or office of state public defender; joint → split equally. Costs for examinations at DPHHS facilities may not be charged to the court administrator or public defender.</div>
<div class="sub"><span class="sl">(6)</span> A court may not order the superintendent of MSH to designate an examiner unless no person within the county of venue is willing, able, or available to perform the examination.</div>
<div class="note"><span class="nlbl">Cross-Reference</span>Results feed into the report required by <strong>§ 46-14-206</strong>, fitness determination under <strong>§ 46-14-221</strong>, and expert testimony standards under <strong>§ 46-14-213</strong>. MSH admission prioritization is governed by <strong>§ 46-14-223</strong> (2025).</div>`,
  history:"En. 95-505, Ch. 196, L. 1967; amd. Ch. 713, L. 1979; amd. Ch. 800, L. 1991; amd. Ch. 303, L. 2001; amd. Ch. 140, L. 2007; amd. Sec. 13, Ch. 161, L. 2015; amd. Sec. 5, Ch. 607, L. 2025"},

  {id:"s203",cite:"MCA § 46-14-203",title:"Renumbered 46-14-206",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",repealed:true,repealedText:"Renumbered 46-14-206.",content:"",history:""},

  {id:"s204",cite:"MCA § 46-14-204",title:"Prosecution's Right to Examination",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",
  content:`<div class="sub"><span class="sl">(1)</span> When the defense discloses the report of the examination to the prosecution or files a notice of the intention to rely on a defense of mental disease or disorder, the prosecution is entitled to have the defendant examined by a qualified psychiatrist, licensed clinical psychologist, or advanced practice registered nurse.</div>
<div class="sub"><span class="sl">(2)</span> The report of the examination must be disclosed to the defense within 10 days of its receipt by the prosecution.</div>`,
  history:"En. Sec. 153, Ch. 800, L. 1991; amd. Sec. 3, Ch. 303, L. 2001; amd. Sec. 14, Ch. 161, L. 2015"},

  {id:"s205",cite:"MCA § 46-14-205",title:"Access to Defendant for Examination",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",
  content:`<div class="sub">If either the defendant or the prosecution wishes the defendant to be examined by a qualified psychiatrist, licensed clinical psychologist, or advanced practice registered nurse selected by the party proposing the examination — in order to determine fitness to proceed or whether the defendant had a particular state of mind that is an essential element of the offense — the examiner must be permitted to have reasonable access to the defendant for the purpose of the examination.</div>`,
  history:"En. 95-507, Ch. 196, L. 1967; amd. Ch. 800, L. 1991; Sec. 46-14-212, MCA 1989; redes. 46-14-205 by Code Commissioner, 1991; amd. Sec. 4, Ch. 303, L. 2001"},

  {id:"s206",cite:"MCA § 46-14-206",title:"Report of Examination",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",
  content:`<div class="sub"><span class="sl">(1)</span> A report of examination ordered under § 46-14-202 must include: (a) a description of the nature of the examination; (b) a diagnosis of the defendant's mental condition, including an opinion as to whether the defendant suffers from a mental disorder (§ 53-21-102) and may require commitment, or is seriously developmentally disabled (§ 53-20-102); and (c) if the defendant suffers from a mental disease or disorder or developmental disability, an opinion as to the defendant's capacity to understand the proceedings and to assist in the defendant's own defense.</div>
<div class="sub"><span class="sl">(2)</span> A court may direct that the report also include: (a) an opinion as to the capacity of the defendant to have a particular state of mind that is an element of the offense; and (b) an opinion as to capacity to appreciate criminality or conform conduct, when: (i) parties having received a fitness opinion stipulate to unfitness; (ii) necessary for psychiatric testimony at trial; (iii) the defendant raises a defense under § 46-14-311(1); or (iv) necessary for sentencing consideration.</div>
<div class="sub"><span class="sl">(3)</span> If the examination cannot be conducted due to the defendant's unwillingness to participate, the report must state that fact and, if possible, include an opinion as to whether the unwillingness was the result of the mental disease or disorder or developmental disability.</div>`,
  history:"En. 95-505, Ch. 196, L. 1967; amd. Ch. 800, L. 1991; Sec. 46-14-203, MCA 1989; redes. 46-14-206 by Code Commissioner, 1991; amd. Ch. 452, L. 2003; amd. Sec. 15, Ch. 161, L. 2015; amd. Sec. 6, Ch. 607, L. 2025"},

  {id:"s207",cite:"MCA §§ 46-14-207 through 46-14-210",title:"Reserved",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",repealed:true,repealedText:"Reserved.",content:"",history:""},
  {id:"s211",cite:"MCA § 46-14-211",title:"Repealed",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",repealed:true,repealedText:"Repealed.",content:"",history:""},
  {id:"s212",cite:"MCA § 46-14-212",title:"Renumbered 46-14-205",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",repealed:true,repealedText:"Renumbered 46-14-205.",content:"",history:""},

  {id:"s213",cite:"MCA § 46-14-213",title:"Psychiatric or Psychological Testimony Upon Trial",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",
  content:`<div class="sub"><span class="sl">(1)</span> Upon trial, any psychiatrist, licensed clinical psychologist, or APRN who reported under § 46-14-202 or § 46-14-206 may be called as a witness by the prosecutor or by the defense. Both parties may summon any other qualified psychiatrist, licensed clinical psychologist, or APRN to testify, but only a person who has examined the defendant is competent to testify to an expert opinion with respect to the mental condition of the defendant.</div>
<div class="sub"><span class="sl">(2)</span> When a psychiatrist, licensed clinical psychologist, or APRN who has examined the defendant testifies, the expert may make a statement as to the nature of the examination and the diagnosis, and any explanation reasonably serving to clarify the examination and diagnosis. The expert may be cross-examined as to competency, credibility, or the validity of the examination or diagnosis. <strong>A psychiatrist, licensed clinical psychologist, or APRN may not offer an opinion to the jury on the ultimate issue of whether the defendant did or did not have a particular state of mind that is an element of the offense charged.</strong></div>
<div class="note"><span class="nlbl">Forensic Note</span>The prohibition on ultimate-issue opinions in subsection (2) is a significant limitation distinguishing Montana practice. Experts may describe the clinical picture and functional impairments but cannot opine directly on the legal mental state element.</div>`,
  history:"En. 95-507, Ch. 196, L. 1967; amd. Ch. 713, L. 1979; amd. Ch. 800, L. 1991; amd. Sec. 5, Ch. 303, L. 2001"},

  {id:"s214",cite:"MCA § 46-14-214",title:"Form of Verdict and Judgment — Determination of Maximum Period of Confinement — Victim Findings",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",
  content:`<div class="sub"><span class="sl">(1)</span> When the defendant is found not guilty for the reason that due to a mental disease or disorder the defendant did not have a particular state of mind that is an essential element of the offense charged, the verdict and the judgment must state that reason.</div>
<div class="sub"><span class="sl">(2)</span> The court shall determine on the record the charged offense or offenses or any lesser included offense for which the person otherwise may have been convicted, and the maximum sentence the defendant may have received. If there is more than one offense charged, the maximum sentence is limited to the longest single sentence from all charged offenses.</div>
<div class="sub"><span class="sl">(3)</span> The court shall make specific findings regarding whether there is a victim of the crime for which the defendant is found not guilty and, if so, whether the victim wishes to be notified of any conditional release, discharge, or escape of the defendant.</div>
<div class="note"><span class="nlbl">Cross-Reference</span>The maximum sentence determined under subsection (2) caps the permissible period of commitment under <strong>§ 46-14-301(4)</strong>. The victim notification finding under subsection (3) triggers DPHHS notification obligations at conditional release.</div>`,
  history:"En. 95-503, Ch. 196, L. 1967; amd. Ch. 713, L. 1979; amd. Ch. 800, L. 1991; Sec. 46-14-201, MCA 1989; redes. 46-14-214 by Code Commissioner, 1991; amd. Ch. 164, L. 2003; amd. Sec. 16, Ch. 161, L. 2015"},

  {id:"s215",cite:"MCA §§ 46-14-215 and 46-14-216",title:"Reserved",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",repealed:true,repealedText:"Reserved.",content:"",history:""},

  {id:"s217",cite:"MCA § 46-14-217",title:"Admissibility of Statements Made During Examination or Treatment",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",
  content:`<div class="sub">A statement made for the purposes of psychiatric or psychological examination or treatment provided for in this chapter is not admissible in evidence against the person at trial on any issue other than that of the person's mental condition. It is admissible on the issue of the person's mental condition — whether or not it would otherwise be considered a privileged communication — only when and after the defendant presents evidence that due to a mental disease or disorder the defendant did not have a particular state of mind that is an element of the offense charged.</div>
<div class="note"><span class="nlbl">Forensic Note</span>This section provides critical protection for defendants undergoing court-ordered evaluation. Statements made during a § 46-14-202 examination are inadmissible on guilt unless the defendant first opens the door by presenting a mental state defense.</div>`,
  history:"En. 95-509, Ch. 196, L. 1967; amd. Ch. 713, L. 1979; amd. Ch. 800, L. 1991; Sec. 46-14-401, MCA 1989; redes. 46-14-217 by Code Commissioner, 1991; amd. Sec. 17, Ch. 161, L. 2015"},

  {id:"s218",cite:"MCA §§ 46-14-218 through 46-14-220",title:"Reserved",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",repealed:true,repealedText:"Reserved.",content:"",history:""},

  {id:"s221",cite:"MCA § 46-14-221",title:"Determination of Fitness to Proceed — Procedure on Finding of Unfitness — Expenses — Involuntary Treatment — Rulemaking Authority",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",
  content:`<div class="sub"><span class="sl">(1)(a)</span> When the issue of the defendant's fitness to proceed is raised, and an examination under § 46-14-202 has been completed, the defendant's fitness must be determined by the court.</div>
<div class="sub"><span class="sl">(1)(b)-(c)</span> If neither party contests the report filed under § 46-14-206, the court may make the determination on the basis of the report. If contested, the court shall hold a hearing. Parties have the right to subpoena and cross-examine the examiners and to offer evidence.</div>
<div class="sub"><span class="sl">(1)(d)</span> In determining fitness, the court shall restrict analysis to: (i) whether the defendant suffers from a mental disorder (§ 53-21-102) or is seriously developmentally disabled (§ 53-20-102); (ii) whether the defendant may require commitment; and (iii) whether the defendant has the capacity to understand the proceedings and to assist in the defendant's own defense.</div>
<div class="sub"><span class="sl">(2)(a)</span> If the court determines that the defendant lacks fitness to proceed, proceedings must be suspended and the court shall commit the defendant to an appropriate mental health facility, residential facility, or to DPHHS custody for so long as unfitness endures or until disposition is made.</div>
<div class="sub"><span class="sl">(2)(b)</span> The court may not commit the defendant to a private mental health facility or hospital without the express consent of that facility.</div>
<div class="sub"><span class="sl">(3)(a)</span> The committing court shall, after receiving notice from DPHHS that a defendant has been restored to fitness, order the defendant returned to the committing county and set the matter for trial. For any incarcerated defendant, within 90 days of ordering commitment, the court shall review the defendant's status. If not admitted and still unfit, the court shall assess whether proceedings must be dismissed or whether alternatives — including involuntary medication — are appropriate.</div>
<div class="sub"><span class="sl">(3)(b)</span> If an incarcerated defendant requires treatment, the county attorney may petition for an order requiring compliance, including involuntary administration of medication. The defendant has a right to a hearing. The court must make specific findings of an overriding justification and medical appropriateness before ordering involuntary medication.</div>
<div class="sub"><span class="sl">(3)(c)</span> On admission, the facility shall evaluate the defendant and develop an individualized treatment plan. If the defendant refuses to comply, the facility may involuntarily administer medications if criteria are met: mental illness, unfitness determination, best medical interests, grave disability or likelihood of serious harm, and procedural safeguards through a treatment review committee and involuntary medication review board.</div>
<div class="sub"><span class="sl">(3)(e)</span> After the initial 90-day review, the court shall review custodial status every 30 days or at an interval the court determines appropriate. If the defendant remains unfit, will not become fit in the foreseeable future, and alternatives to forensic commitment are not appropriate, the court shall dismiss the charge without prejudice and the prosecutor may petition for civil commitment under Title 53, chapter 21.</div>
<div class="sub"><span class="sl">(3)(f)</span> If unfitness is due to developmental disability, the proceeding must be dismissed and the prosecutor shall petition for disposition under Title 53, chapter 20.</div>
<div class="sub"><span class="sl">(4)</span> The fact that a defendant is unfit does not preclude legal objections to the prosecution susceptible to fair determination prior to trial and made without the personal participation of the defendant.</div>
<div class="note"><span class="nlbl">Cross-Reference</span>Examination is ordered under <strong>§ 46-14-202</strong>; reports are governed by <strong>§ 46-14-206</strong>; restoration is governed by <strong>§ 46-14-222</strong>. FMHF treatment plan obligations are in <strong>ARM 37.106.1615</strong>. MSH admission priority is governed by <strong>§ 46-14-223</strong> (2025).</div>`,
  history:"En. 95-506, Ch. 196, L. 1967; amd. Ch. 713, L. 1979; amd. Ch. 800, L. 1991; amd. Ch. 452, L. 2003; amd. Ch. 140, L. 2007; amd. Sec. 7, Ch. 607, L. 2025"},

  {id:"s222",cite:"MCA § 46-14-222",title:"Proceedings if Fitness Regained",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",
  content:`<div class="sub">When the court, on its own motion or upon application of the DPHHS director, the prosecution, or the defendant or the defendant's legal representative, determines — after a hearing if a hearing is requested — that the defendant has regained fitness to proceed, the proceeding must be resumed. If the court is of the view that so much time has elapsed since the commitment that it would be unjust to resume the criminal proceedings, the court may dismiss the charge and may order the defendant to be discharged or, subject to the law governing civil commitment of persons suffering from serious mental illness, order the defendant committed to an appropriate facility of DPHHS.</div>`,
  history:"En. Ch. 713, L. 1979; amd. Ch. 800, L. 1991; amd. Ch. 449, L. 2005; amd. Ch. 140, L. 2007"},

  {id:"s223",cite:"MCA § 46-14-223",title:"Prioritization of Admissions",meta:"Part 2. Procedure When Mental Disease or Disorder an Issue",
  content:`<div class="sub">The Montana State Hospital shall prioritize admissions for evaluations and treatment as follows:</div>
<div class="sub"><span class="sl">(1)</span> First priority must be given to a pretrial defendant who has been ordered committed to be evaluated and treated under § 46-14-221;</div>
<div class="sub"><span class="sl">(2)</span> Second priority must be given to a pretrial defendant charged with a crime of violence, as defined in § 46-18-104, with an order of transport to the Montana State Hospital; and</div>
<div class="sub"><span class="sl">(3)</span> As otherwise established by the department by administrative rule.</div>
<div class="note"><span class="nlbl">New 2025</span>Enacted by Ch. 607, L. 2025. Addresses MSH admission capacity pressures and provides a statutory priority framework for forensic commitments. Priority tier 1 covers both fitness evaluation (§ 46-14-202) and restoration treatment (§ 46-14-221) orders.</div>`,
  history:"En. Sec. 8, Ch. 607, L. 2025"},

  // ── PART 3 ──────────────────────────────────────────────────────────────
  {id:"s301",cite:"MCA § 46-14-301",title:"Commitment Upon Finding of Not Guilty by Reason of Lack of Mental State — Hearing to Determine Release or Discharge — Limitation on Confinement",meta:"Part 3. Disposition of Defendant",partDivider:"Part 3 — Disposition of Defendant",
  content:`<div class="sub"><span class="sl">(1)</span> When a defendant is found not guilty for the reason that due to a mental disease or disorder the defendant could not have a particular state of mind that is an essential element of the offense charged, the court shall order a predisposition investigation under §§ 46-18-112 and 46-18-113, which must include an investigation of the present mental condition of the defendant. If trial was by jury, the court shall hold a hearing to determine appropriate disposition. The testimony and evidence presented at trial must be considered.</div>
<div class="sub"><span class="sl">(2)</span> The court shall evaluate the nature of the offense charged. If the offense: (a) involved a substantial risk of serious bodily injury or death, actual bodily injury, or substantial property damage — the court may find that the defendant presents a danger to self or others and may commit the defendant to DPHHS custody for placement in an appropriate mental health facility for custody, care, and treatment (if seriously developmentally disabled, the prosecutor shall petition under Title 53, chapter 20); or (b) did not involve such risks — the court shall release the defendant.</div>
<div class="sub"><span class="sl">(3)</span> A person committed must have a hearing within 180 days of confinement to determine present mental condition and whether the person must be discharged, released, or whether commitment may be extended. The hearing is a civil proceeding; the burden is upon the state to prove by clear and convincing evidence that the person may not be safely released because the person continues to present a substantial risk of: (a) serious bodily injury or death to self or others; (b) an imminent threat of physical injury; or (c) substantial property damage.</div>
<div class="sub"><span class="sl">(4)</span> According to the court's determination, the person must be discharged, released on conditions the court determines necessary, or committed to DPHHS custody for placement in an appropriate mental health facility. <strong>The period of commitment may not exceed the maximum sentence determined under § 46-14-214(2).</strong> At the time the maximum sentence period expires, involuntary civil commitment proceedings may be instituted under Title 53, chapter 21.</div>
<div class="sub"><span class="sl">(5)</span> A professional person shall review the status of the person each year. At the time of annual review, DPHHS, the person, or the person's representative may petition for discharge or release, triggering a hearing under subsection (3).</div>
<div class="note"><span class="nlbl">Cross-Reference</span>The maximum confinement cap in subsection (4) is determined by the verdict form under <strong>§ 46-14-214(2)</strong>. Conditional release terms and revocation are governed by <strong>§ 46-14-304</strong>. Patient applications for discharge are governed by <strong>§ 46-14-303</strong>. FMHF court reporting is in <strong>ARM 37.106.1645</strong>.</div>`,
  history:"En. 95-508, Ch. 196, L. 1967; amd. Ch. 713, L. 1979; amd. Ch. 800, L. 1991; amd. Ch. 397, L. 1993; amd. Ch. 546, L. 1995; amd. Ch. 164, L. 2003; amd. Sec. 18, Ch. 161, L. 2015"},

  {id:"s302",cite:"MCA § 46-14-302",title:"Discharge or Release Upon Motion of Director",meta:"Part 3. Disposition of Defendant",
  content:`<div class="sub"><span class="sl">(1)</span> If the DPHHS director believes a person committed under § 46-14-301 may be discharged or released on condition without danger to the person or others because the person no longer suffers from a mental disease or disorder causing substantial risk of serious bodily injury or death, an imminent threat of physical injury, or substantial property damage — the director shall make application to the committing district court and shall send a copy to the county attorney of the committing county.</div>
<div class="sub"><span class="sl">(2)</span> Either the director or the person may also make application to the court as part of the person's annual treatment review.</div>
<div class="sub"><span class="sl">(3)</span> The court shall appoint at least one qualified psychiatrist, licensed clinical psychologist, or APRN to examine the person and report within 60 days or a longer period the court determines necessary. The person's own professional examiner may also be secured; if the person cannot afford one, the court shall appoint an additional professional person, compensated by DPHHS.</div>
<div class="sub"><span class="sl">(5)-(6)</span> If the court is satisfied that the committed person may be discharged or released because the person no longer presents the required substantial risk, the court shall order discharge. If not satisfied, the court shall promptly order a hearing. The hearing is a civil proceeding; the state bears the burden by clear and convincing evidence. According to the determination, the person must be discharged, released on conditions, or recommitted subject to discharge only via §§ 46-14-303 and 46-14-302.</div>`,
  history:"En. 95-508, Ch. 196, L. 1967; amd. Ch. 800, L. 1991; amd. Ch. 397, L. 1993; amd. Ch. 546, L. 1995; amd. Ch. 303, L. 2001; amd. Sec. 19, Ch. 161, L. 2015"},

  {id:"s303",cite:"MCA § 46-14-303",title:"Application for Discharge or Release by Committed Person",meta:"Part 3. Disposition of Defendant",
  content:`<div class="sub">A committed person may make application for discharge or release to the district court by which the person was committed (unless that court transfers jurisdiction to the court in the district in which the person has been placed). The procedure on application is the same as prescribed in § 46-14-302 for applications by the DPHHS director. However, an application by a committed person need not be considered until the person has been confined for a period of not less than 6 months from the date of the order of commitment, and if the determination of the court is adverse to the application, the person may not file a further application until 1 year has elapsed from the date of any preceding hearing on an application for the person's release or discharge.</div>
<div class="note"><span class="nlbl">Cross-Reference</span>This is the patient's independent avenue for seeking release, separate from the director's motion under <strong>§ 46-14-302</strong> and the annual review under <strong>§ 46-14-301(5)</strong>. The 6-month initial bar and 1-year re-application bar are absolute. FMHF must inform patients of this right; see <strong>ARM 37.106.1620</strong> (patient rights in secure setting).</div>`,
  history:"En. 95-508, Ch. 196, L. 1967; amd. Ch. 800, L. 1991; amd. Ch. 397, L. 1993; amd. Ch. 546, L. 1995"},

  {id:"s304",cite:"MCA § 46-14-304",title:"Conditional Release — Revocation",meta:"Part 3. Disposition of Defendant",
  content:`<div class="sub"><span class="sl">(1)</span> A person who has been conditionally released remains under the supervision of the Department of Public Health and Human Services until the committing court discharges the person.</div>
<div class="sub"><span class="sl">(2)</span> When the person is conditionally released, the DPHHS director shall provide written notice of the conditions of the person's release to any community facility or program treating the person, the county attorney of the county in which the person was committed, and the county attorney of the county in which the person is required to receive treatment.</div>
<div class="sub"><span class="sl">(3)</span> On motion of a county attorney or DPHHS, the court may order revocation of a person's conditional release if the court determines after hearing that: (a) the conditions of release have not been fulfilled; and (b) based on the violations and the person's past mental health history, there is a substantial likelihood that the person continues to suffer from a mental disease or disorder that causes a substantial risk of: (i) serious bodily injury or death to the person or others; (ii) a threat of physical injury to the person or others; or (iii) substantial property damage.</div>
<div class="sub"><span class="sl">(4)</span> If the court finds that conditional release should be revoked, the court shall immediately order the person recommitted to DPHHS custody, subject to discharge or release only in accordance with §§ 46-14-302 and 46-14-303.</div>
<div class="note"><span class="nlbl">Cross-Reference</span>This is the operative conditional release and revocation provision for NGRI defendants committed under <strong>§ 46-14-301</strong>. Community supervision is provided by programs licensed under <strong>ARM 37.106.19</strong>; FMHF discharge planning is in <strong>ARM 37.106.1650</strong>.</div>`,
  history:"En. 95-508, Ch. 196, L. 1967; amd. Ch. 800, L. 1991; amd. Ch. 397, L. 1993; amd. Ch. 546, L. 1995; amd. Sec. 20, Ch. 161, L. 2015; amd. Sec. 1, Ch. 639, L. 2023"},

  {id:"s305",cite:"MCA §§ 46-14-305 through 46-14-310",title:"Reserved",meta:"Part 3. Disposition of Defendant",repealed:true,repealedText:"Reserved.",content:"",history:""},

  {id:"s311",cite:"MCA § 46-14-311",title:"Consideration of Mental Disease or Disorder or Developmental Disability in Sentencing",meta:"Part 3. Disposition of Defendant",
  content:`<div class="sub"><span class="sl">(1)</span> Whenever a defendant is convicted on a verdict of guilty or a plea of guilty or nolo contendere and claims at the time of the omnibus hearing under § 46-13-110 (or, if no omnibus hearing is held, at the time of any change of plea) that at the time of the commission of the offense the defendant was suffering from a mental disease or disorder or developmental disability that rendered the defendant unable to appreciate the criminality of the defendant's behavior or to conform the defendant's behavior to the requirements of law, the sentencing court shall consider any relevant evidence presented at trial and may also consider the results of a presentence investigation requested under subsection (2).</div>
<div class="sub"><span class="sl">(2)</span> The sentencing court may order a presentence investigation and report under § 46-18-111. If requested, the investigation must include a mental evaluation by a person appointed by the DPHHS director or designee. The evaluation must include an opinion as to whether the defendant suffered from the described condition, and if so, a recommendation as to care, custody, and treatment needs.</div>
<div class="note"><span class="nlbl">Note</span>§ 46-14-311 is a <strong>sentencing-stage provision</strong>, not the conditional release provision. A finding under this section may lead to a sentence under <strong>§ 46-14-312</strong> committing the defendant to DPHHS custody for treatment. It is distinct from NGRI commitment under § 46-14-301.</div>`,
  history:"En. Sec. 10, Ch. 713, L. 1979; amd. Ch. 800, L. 1991; amd. Ch. 395, L. 1999; amd. Ch. 452, L. 2003; amd. Sec. 21, Ch. 161, L. 2015; amd. Sec. 11, Ch. 456, L. 2019"},

  {id:"s312",cite:"MCA § 46-14-312",title:"Sentence to Be Imposed",meta:"Part 3. Disposition of Defendant",
  content:`<div class="sub"><span class="sl">(1)</span> If the court finds that the defendant at the time of the offense did not suffer from a mental disease or disorder as described in § 46-14-311, the court shall sentence the defendant as provided in Title 46, chapter 18.</div>
<div class="sub"><span class="sl">(2)</span> If the court finds that the defendant suffered from a mental disease or disorder or developmental disability as described in § 46-14-311, any mandatory minimum sentence prescribed by law for the offense need not apply. The court shall sentence the defendant to be committed to DPHHS custody for placement — after consideration of treatment recommendations — in an appropriate correctional facility, mental health facility, residential facility, or developmental disabilities facility, for custody, care, and treatment for a definite period not exceeding the maximum term of imprisonment that could be imposed under subsection (1). The DPHHS director may subsequently transfer the defendant to another facility that better serves the defendant's needs.</div>
<div class="sub"><span class="sl">(3)</span> Either the director or a defendant sentenced under subsection (2) may petition the sentencing court for review of the sentence if the professional person certifies that: (a) the defendant no longer suffers from a mental disease or disorder; (b) it no longer renders the defendant unable to appreciate criminality or conform conduct; (c) the defendant has a disorder but is not a danger to self or others; or (d) the defendant has a disorder that makes the defendant dangerous, but there is no available treatment, the defendant refuses to cooperate, or the defendant will no longer benefit from active inpatient treatment.</div>
<div class="sub"><span class="sl">(4)</span> The sentencing court may make any order not inconsistent with its original sentencing authority, except the length of confinement or supervision must equal that of the original sentence. The professional person shall review the defendant's status each year.</div>`,
  history:"En. Sec. 11, Ch. 713, L. 1979; amd. Ch. 800, L. 1991; amd. Ch. 397, L. 1993; amd. Ch. 546, L. 1995; amd. Ch. 452, L. 2003; amd. Sec. 22, Ch. 161, L. 2015"},

  {id:"s313",cite:"MCA § 46-14-313",title:"Discharge of Defendant from Supervision",meta:"Part 3. Disposition of Defendant",
  content:`<div class="sub">At the expiration of the period of commitment or period of treatment specified by the court under § 46-14-312, the defendant must be discharged from custody and further supervision, subject only to the law regarding the civil commitment of persons suffering from serious mental illness.</div>`,
  history:"En. Sec. 12, Ch. 713, L. 1979; amd. Sec. 167, Ch. 800, L. 1991"},
];

const ARM16_RULES = [
  {id:"a1601",cite:"ARM 37.106.1601",title:"Purpose",meta:"ARM Title 37, Chapter 106, Subchapter 16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> These rules establish minimum standards for a licensed mental health center to operate a secured <em class="dt">forensic mental health facility (FMHF)</em> for adults who are committed for custody, care, treatment, or evaluation pursuant to Title 46, chapter 14, MCA, or who are inmates of a correctional facility receiving treatment in a separate mental health setting.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1602",cite:"ARM 37.106.1602",title:"Scope",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> A forensic mental health facility (FMHF) of a licensed mental health center provides twenty-four hour, seven days a week, secured nonhospital-based forensic mental health services for adults who are:</div>
<div class="sub"><span class="al">(a)</span> committed to a mental health facility for evaluation of fitness to proceed pursuant to 46-14-202(2), MCA;</div>
<div class="sub"><span class="al">(b)</span> committed to the custody of the director of the department to be placed for treatment to gain fitness to proceed pursuant to 46-14-221, MCA;</div>
<div class="sub"><span class="al">(c)</span> committed to the custody of the director of the department to be placed for custody, care, and treatment under 46-14-301, MCA;</div>
<div class="sub"><span class="al">(d)</span> admitted to an FMHF under a court order for a mental evaluation to be included in a pre-sentence investigation under 46-14-311, MCA;</div>
<div class="sub"><span class="al">(e)</span> sentenced to be committed to the custody of the director of the department to be placed for custody, care, and treatment under 46-14-312, MCA;</div>
<div class="sub"><span class="al">(f)</span> in the custody of the Department of Corrections and transferred to an FMHF under 53-21-130, MCA, or accepted for voluntary admission following such a transfer under 53-21-111, MCA; or</div>
<div class="sub"><span class="al">(g)</span> committed to the Montana State Hospital under 53-21-127, MCA, while serving a sentence at a correctional facility.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1603",cite:"ARM 37.106.1603",title:"Application of Rules",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> In addition to the requirements established in this subchapter, a licensed mental health center operating a forensic mental health facility (FMHF) must have an FMHF program endorsement issued by the department. To receive an FMHF program endorsement, the licensed mental health center must establish, to the department's satisfaction, that it meets the requirements stated in these rules.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1604",cite:"ARM 37.106.1604",title:"Application of Other Rules",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> In addition to the requirements established in this subchapter, each licensed mental health center operating a forensic mental health facility (FMHF) must comply with all the requirements established in ARM Title 37, chapter 106, subchapter 3, with the exception of ARM 37.106.302 and 37.106.316.</div>
<div class="sub"><span class="al">(2)</span> To the extent that other licensure rules in ARM Title 37, chapter 106, subchapter 3 conflict with the terms of this subchapter, the terms of this subchapter will apply to an FMHF.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1605",cite:"ARM 37.106.1605",title:"Definitions",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> <em class="dt">"Adult"</em> means an individual 18 years of age and older.</div>
<div class="sub"><span class="al">(2)</span> <em class="dt">"Emergency situation"</em> has the meaning given to it by 53-21-102, MCA.</div>
<div class="sub"><span class="al">(3)</span> <em class="dt">"Forensic mental health services"</em> means mental health services for persons referred for care, custody, treatment, or evaluation by or through the criminal justice system.</div>
<div class="sub"><span class="al">(4)</span> <em class="dt">"Immediate emergency"</em> means a situation involving a client that jeopardizes the immediate physical safety of a client, a staff member, or others.</div>
<div class="sub"><span class="al">(5)</span> <em class="dt">"Involuntary medication"</em> means medication administered to a client when one or more of the following circumstances are present:</div>
<div class="sub"><span class="al">(a)</span> administration of medication is against the specific wish of a client, made evident by verbal or nonverbal behavior reasonably interpreted as an objection;</div>
<div class="sub"><span class="al">(b)</span> a client who does not have a legally appointed guardian lacks capacity to give informed consent; or</div>
<div class="sub"><span class="al">(c)</span> a client's legally appointed guardian cannot or will not give consent.</div>
<div class="sub"><span class="al">(6)</span> <em class="dt">"Licensed health care practitioner"</em> means a licensed physician, physician assistant, or advanced practice registered nurse who is practicing within the scope of the license issued by the Department of Labor and Industry under Title 37 of the MCA.</div>
<div class="sub"><span class="al">(7)</span> <em class="dt">"Licensed health care professional"</em> means a licensed physician, physician assistant, advanced practice registered nurse, or registered nurse who is practicing within the scope of the license issued by the Department of Labor and Industry under Title 37 of the MCA.</div>
<div class="sub"><span class="al">(8)</span> <em class="dt">"Medication administration"</em> means an act in which a prescribed drug or biological is given to a client by an individual who is authorized under state laws and regulations governing such acts.</div>
<div class="sub"><span class="al">(9)</span> <em class="dt">"Restraint"</em> means:</div>
<div class="sub"><span class="al">(a)</span> any manual method, physical or mechanical device, material, or equipment that immobilizes or reduces the ability of a client to move his or her arms, legs, body, or head freely;</div>
<div class="sub"><span class="al">(b)</span> a drug or medication when it is used to restrict the patient's behavior or freedom of movement and is not a standard treatment or dosage for the patient's condition;</div>
<div class="sub"><span class="al">(c)</span> restraint does not include devices, such as orthopedically prescribed devices, surgical dressings or bandages, protective helmets, or other methods that involve the physical holding of a client for the purpose of conducting routine physical examinations or tests, or to protect the client from falling out of bed, or to permit the client to participate in activities without the risk of physical harm (this does not include a physical escort); or</div>
<div class="sub"><span class="al">(d)</span> restraint does not include medications administered during an immediate emergency which are individually prescribed to assist a client to regain control of the client's dangerous behavior.</div>
<div class="sub"><span class="al">(10)</span> <em class="dt">"Sally port"</em> means a secure entry way that consists of a series of doors or gates.</div>
<div class="sub"><span class="al">(11)</span> <em class="dt">"Seclusion"</em> means the involuntary confinement of a client alone in a room or area from which the client is physically prevented from leaving. Confining clients to his or her bedrooms during medication administration, shift changes, or facility emergencies does not constitute seclusion for the purposes of this rule.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1608",cite:"ARM 37.106.1608",title:"Construction Requirements",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> Prior to construction or operation of a forensic mental health facility (FMHF), floor plans for the FMHF must be submitted to the department for review, comment, and approval. The department must also inspect and approve any new construction or any addition or alteration to an FMHF prior to occupancy.</div>
<div class="sub"><span class="al">(2)</span> Prior to occupancy of an FMHF, or any addition or alteration to an FMHF, the FMHF must undergo an onsite inspection and receive the approval of the department's License Bureau, Construction Consultant.</div>
<div class="sub"><span class="al">(3)</span> Any building used as an FMHF must be classified at a minimum as International Conference of Building Officials (ICBO) Construction type I-FR, or greater.</div>
<div class="sub"><span class="al">(4)</span> All areas of an FMHF must be protected by automatic fire suppression. In unsupervised client areas, sprinkler heads must be recessed or of a design to restrict client access. An FMHF must provide the following:</div>
<div class="sub"><span class="al">(a)</span> an operable UL listed fire alarm system with automatic response notification on alarm; and</div>
<div class="sub"><span class="al">(b)</span> supervised smoke detectors throughout the facility reporting to the fire alarm system.</div>
<div class="sub"><span class="al">(5)</span> An FMHF must meet the water supply system requirements of ARM 37.111.115.</div>
<div class="sub"><span class="al">(6)</span> An FMHF must meet the sewage system requirements of ARM 37.111.116.</div>
<div class="sub"><span class="al">(7)</span> An FMHF must have a double fence installed around any client accessible area.</div>
<div class="sub"><span class="al">(8)</span> Each fence must be a minimum of 12 feet high, and</div>
<div class="sub"><span class="al">(a)</span> have unclimbable security mesh fabric installed on the top five feet;</div>
<div class="sub"><span class="al">(b)</span> have concertina wire installed on the top; and</div>
<div class="sub"><span class="al">(c)</span> be buried 18 inches below grade.</div>
<div class="sub"><span class="al">(9)</span> There must be a minimum 12 feet between the two fences that is free of all above ground obstructions.</div>
<div class="sub"><span class="al">(10)</span> An FMHF must have an outside assembly area of refuge for facility evacuation during an emergency. The area must be:</div>
<div class="sub"><span class="al">(a)</span> fenced and secured and large enough to safely hold all clients and staff; and</div>
<div class="sub"><span class="al">(b)</span> far enough from the building to be considered a safe public way.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-201, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1609",cite:"ARM 37.106.1609",title:"Secured Units",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> A forensic mental health facility (FMHF) must have one or more separate secured unit(s) within the facility for housing clients that includes bedrooms and common space.</div>
<div class="sub"><span class="al">(2)</span> A secured unit must be staffed at all times clients are present in the unit.</div>
<div class="sub"><span class="al">(3)</span> A secured unit must have a staff station to include the following:</div>
<div class="sub"><span class="al">(a)</span> provisions for charting;</div>
<div class="sub"><span class="al">(b)</span> provisions for hand washing;</div>
<div class="sub"><span class="al">(c)</span> provisions for secured medication storage and preparation; and</div>
<div class="sub"><span class="al">(d)</span> telephone access.</div>
<div class="sub"><span class="al">(4)</span> A secured unit must have access to a nourishment station or to a kitchen that must include the following:</div>
<div class="sub"><span class="al">(a)</span> a work counter;</div>
<div class="sub"><span class="al">(b)</span> a refrigerator;</div>
<div class="sub"><span class="al">(c)</span> storage cabinets;</div>
<div class="sub"><span class="al">(d)</span> a sink;</div>
<div class="sub"><span class="al">(e)</span> space for trays and dishes used for nonscheduled meal service;</div>
<div class="sub"><span class="al">(f)</span> hand washing facilities immediately accessible to clients and staff; and</div>
<div class="sub"><span class="al">(g)</span> ice for client consumption provided by icemaker-dispenser units or periodically made available during the day.</div>
<div class="sub"><span class="al">(5)</span> A common space within each secured unit must be provided at a ratio of 35 square feet per client.</div>
<div class="sub"><span class="al">(6)</span> The corridors of a secured unit must have general illumination with provisions for reducing light levels at night.</div>
<div class="sub"><span class="al">(7)</span> No more than one client must reside in a bedroom.</div>
<div class="sub"><span class="al">(8)</span> Client bedrooms must be at a minimum of 70 square feet and must include the following:</div>
<div class="sub"><span class="al">(a)</span> a bed with a waterproof mattress;</div>
<div class="sub"><span class="al">(b)</span> a small wardrobe, dresser, shelves, or bed compartment for storage of clients' personal items;</div>
<div class="sub"><span class="al">(c)</span> general lighting and night lighting, control for night lighting may be located outside the room at the room entrance;</div>
<div class="sub"><span class="al">(d)</span> electrical outlets that are tamper-resistant and GFI-protected, outlets may be controlled from outside of the room;</div>
<div class="sub"><span class="al">(e)</span> a window with a minimum of 248 square inches of glazing which must be designed to limit the opportunity for clients to inflict serious harm as a result of breaking the window and using pieces to inflict harm on themselves or others. Windows:</div>
<div class="sub"><span class="al">(i)</span> must be of tempered glass or laminated safety glass to resist impact loads; and</div>
<div class="sub"><span class="al">(ii)</span> if operable, must have security locks.</div>
<div class="sub"><span class="al">(9)</span> Sinks and toilets may be provided in client rooms. The fixtures may be controlled from outside of the room.</div>
<div class="sub"><span class="al">(10)</span> An FMHF must not use automatic door closures unless required. If required, such closures must be mounted on the public side of the door within view of a staff work station or under video surveillance.</div>
<div class="sub"><span class="al">(11)</span> An FMHF must use doors that:</div>
<div class="sub"><span class="al">(a)</span> have door hinges designed to minimize points for hanging (i.e., cut hinge type); and</div>
<div class="sub"><span class="al">(b)</span> have tamper-resistant fasteners.</div>
<div class="sub"><span class="al">(12)</span> An FMHF must provide:</div>
<div class="sub"><span class="al">(a)</span> at least one toilet for every eight clients;</div>
<div class="sub"><span class="al">(b)</span> at least one bathing unit for every twelve clients, a shower or tub is not required if the FMHF utilizes a central bathing unit for all clients; and</div>
<div class="sub"><span class="al">(c)</span> doors to toilet rooms or bathing units that swing out or slide into the wall and which must be capable of being unlocked from the outside.</div>
<div class="sub"><span class="al">(13)</span> Toilet rooms and bathing units may be under key control by staff.</div>
<div class="sub"><span class="al">(14)</span> An FMHF must not use towel bars, clothing rods, hooks, or lever handles.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-201, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1610",cite:"ARM 37.106.1610",title:"Common Use Areas",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> A forensic mental health facility (FMHF) must have an area for social activities at a minimum of 25 square feet per client.</div>
<div class="sub"><span class="al">(2)</span> An FMHF must have a quiet area for clients to utilize according to facility policy.</div>
<div class="sub"><span class="al">(3)</span> An FMHF must have a dining space at a minimum of 35 square feet per client. The dining space may be located off a secured unit in a central area.</div>
<div class="sub"><span class="al">(4)</span> An FMHF must have a minimum of two classrooms with work tables or desks for client use.</div>
<div class="sub"><span class="al">(5)</span> If an FMHF has a vocational training area, it must be equipped with appropriate tools and code-compliant equipment for client use.</div>
<div class="sub"><span class="al">(6)</span> An FMHF must have a gymnasium and a separate client exercise room which includes appropriate exercise equipment in sufficient quantity for client use.</div>
<div class="sub"><span class="al">(7)</span> An FMHF must have a secured outside recreational exercise area with both an enclosed individual client area and a large fenced group area.</div>
<div class="sub"><span class="al">(8)</span> An FMHF must have examination or treatment rooms for private consultation. These rooms must have at a minimum the following:</div>
<div class="sub"><span class="al">(a)</span> 100 square foot floor area;</div>
<div class="sub"><span class="al">(b)</span> a hand-washing station;</div>
<div class="sub"><span class="al">(c)</span> storage facilities; and</div>
<div class="sub"><span class="al">(d)</span> a desk, counter, or shelf space for writing or electronic documentation.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-201, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1611",cite:"ARM 37.106.1611",title:"Observation and Seclusion Room(s)",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> A forensic mental health facility must designate specific room(s) designed for observation, seclusion, and restraint purposes.</div>
<div class="sub"><span class="al">(2)</span> The location of these rooms must facilitate staff observation and monitoring of clients in these areas.</div>
<div class="sub"><span class="al">(3)</span> The room must be equipped with video and audio monitoring equipment.</div>
<div class="sub"><span class="al">(4)</span> The room must have a minimum of 60 square feet and a ceiling height of nine feet. Ceilings in seclusion rooms must be monolithic.</div>
<div class="sub"><span class="al">(5)</span> Rooms used for observation, seclusion, and restraint must be designed to prevent injury to clients. All finishes, light fixtures, vents and diffusers, and sprinklers must be tamper resistant. These rooms must not have: electrical outlets, medical gas outlets or similar devices; sharp corners, edges, or protrusions. The wall must be free of objects or accessories of any kind. Doors must swing out or be a slide in pocket door and have hardware on the exterior side only. The door must be a minimum width of 44 inches and include an impact resistant view panel for discreet staff observation of the client. The use of impact resistant one-way observation windows is permitted.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-201, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1614",cite:"ARM 37.106.1614",title:"Written Policies and Procedures",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> As required in ARM 37.106.1908, a forensic mental health facility (FMHF) must maintain a policy and procedure manual. The policy and procedure manual must be reviewed and updated as necessary, but at a minimum annually.</div>
<div class="sub"><span class="al">(2)</span> In addition to the other requirements of ARM 37.106.1908, the manual must include policies and procedures for:</div>
<div class="sub"><span class="al">(a)</span> security;</div>
<div class="sub"><span class="al">(b)</span> involuntary administration of medication;</div>
<div class="sub"><span class="al">(c)</span> client discharge and transfer procedure;</div>
<div class="sub"><span class="al">(d)</span> client rights and grievances;</div>
<div class="sub"><span class="al">(e)</span> client admission criteria;</div>
<div class="sub"><span class="al">(f)</span> restraint and seclusion;</div>
<div class="sub"><span class="al">(g)</span> establishing fiscal policies governing the management of organizational and individual funds;</div>
<div class="sub"><span class="al">(h)</span> establishing and maintaining staffing requirements;</div>
<div class="sub"><span class="al">(i)</span> informing clients of policies pertaining to the FMHF;</div>
<div class="sub"><span class="al">(j)</span> food services; and</div>
<div class="sub"><span class="al">(k)</span> the detection, reporting, and investigation of abuse and neglect.</div>
<div class="sub"><span class="al">(3)</span> The policy and procedure manual must include a current organizational chart delineating the current lines of authority, responsibility, and accountability for the administration and provision of all FMHF client treatment programs and services.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1615",cite:"ARM 37.106.1615",title:"Security",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> A forensic mental health facility (FMHF) must develop security policies and procedures. At a minimum the policies and procedures must address the following:</div>
<div class="sub"><span class="al">(a)</span> securing the facility;</div>
<div class="sub"><span class="al">(b)</span> summoning outside assistance in the event of an emergency;</div>
<div class="sub"><span class="al">(c)</span> addressing relevant types of natural or client-caused emergency situations; and</div>
<div class="sub"><span class="al">(d)</span> contraband searches.</div>
<div class="sub"><span class="al">(2)</span> An FMHF must have security vestibules or secured car ports or Sally Ports at all facility entrances.</div>
<div class="sub"><span class="al">(3)</span> An FMHF security system must be capable of containing clients within secured units when necessary according to FMHF policy.</div>
<div class="sub"><span class="al">(4)</span> An FMHF security system must be designed to prevent contraband smuggling and must include provisions for monitoring and controlling visitor access and egress.</div>
<div class="sub"><span class="al">(5)</span> All openings into and out of and within the FMHF, e.g., windows, doors, and gates, must be equipped with manual, electric, or magnetic locks.</div>
<div class="sub"><span class="al">(6)</span> An FMHF must provide visual control, i.e., electronic surveillance, of all FMHF corridors, dining areas, classrooms, and social areas.</div>
<div class="sub"><span class="al">(7)</span> Except for use in seclusion or observation rooms, electronic surveillance is not permitted in client bedrooms, bathing units, or toilets.</div>
<div class="sub"><span class="al">(8)</span> Electronic surveillance of a secured unit does not substitute for direct supervision where required by facility policy.</div>
<div class="sub"><span class="al">(9)</span> Special design considerations for injury or suicide prevention must be given to all facility details, finishes, and equipment.</div>
<div class="sub"><span class="al">(10)</span> An FMHF must provide an enclosed secured car port for the receiving, discharge, transfer, or the transportation of clients. The car port must be separated using Underwriters Laboratory or Factory Mutual rated construction providing a minimum of two-hour fire resistance.</div>
<div class="sub"><span class="al">(11)</span> Staff may confine clients to their rooms for all scheduled medication passes, for all staff shift changes, and during any facility emergency. Medication administration and shift changes will last no longer than 30 minutes, and must be limited to no more than three 30-minute periods in a 24-hour period.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-201, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1616",cite:"ARM 37.106.1616",title:"Involuntary Medication Administration",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> A forensic mental health facility (FMHF) must develop and implement a policy for involuntary medication administration that includes:</div>
<div class="sub"><span class="al">(a)</span> procedures for use in an immediate emergency or an emergency situation to ensure the physical safety of the client, a staff member, or others;</div>
<div class="sub"><span class="al">(b)</span> an administrative review process for use when involuntary medication is clinically indicated for a client who is gravely disabled or poses a likelihood of serious harm to themselves, others, or property as a result of a mental disease or disorder. The process must include:</div>
<div class="sub"><span class="al">(i)</span> a formal review within five working days of beginning the involuntary administration of medication, by a medication review committee which includes the medical director of the FMHF, the designee, or both and at least one qualified psychiatrist who is not employed at the FMHF;</div>
<div class="sub"><span class="al">(iii)</span> written advance notice of the review and the right to participate which must be given to the client, guardian, and Mental Disabilities Board of Visitors;</div>
<div class="sub"><span class="al">(iv)</span> an opportunity for review of the decision of the panel by the director of the licensed mental health center;</div>
<div class="sub"><span class="al">(v)</span> review by the committee at 14 and 90 days after the initial authorization of involuntary administration of medication.</div>
<div class="sub"><span class="al">(c)</span> procedures for seeking and implementing a court order authorizing involuntary administration of medication for clients who are placed at the FMHF under 46-14-221, MCA, and for whom the sole purpose of involuntary medication is to gain fitness to proceed.</div>
<div class="sub"><span class="al">(2)</span> Attempts must be made to administer medications with the full consent of the client receiving those medications. Such attempts must be documented.</div>
<div class="sub"><span class="al">(3)</span> Involuntary medications must be discontinued when no longer necessary as determined by a licensed health care practitioner.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1617",cite:"ARM 37.106.1617",title:"Restraint and Seclusion",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> A forensic mental health facility (FMHF) must be capable of providing restraint or seclusion and must ensure that such restraint or seclusion is performed in compliance with 53-21-146, MCA.</div>
<div class="sub"><span class="al">(2)</span> The use of medication solely for restraint is prohibited.</div>
<div class="sub"><span class="al">(3)</span> Restraint or seclusion may only be used when less restrictive interventions have been determined to be ineffective to protect the client, staff, or others from harm.</div>
<div class="sub"><span class="al">(4)</span> The type and technique of restraint or seclusion must be the least restrictive intervention that will be effective to protect the client, staff, or others from harm.</div>
<div class="sub"><span class="al">(5)</span> The use of restraint or seclusion must be implemented in accordance with safe and appropriate restraint and seclusion techniques as determined by facility policy.</div>
<div class="sub"><span class="al">(6)</span> Orders for the use of restraint or seclusion must never be written as a standing order or on an as-needed basis (PRN).</div>
<div class="sub"><span class="al">(7)</span> A verbal or written order must be obtained from the licensed health care practitioner prior to initiation or as soon as possible after emergency initiation of seclusion or restraint.</div>
<div class="sub"><span class="al">(8)</span> A licensed health care practitioner or registered nurse, in accordance with facility policy, must see the client face-to-face within one hour of the initiation of restraint or seclusion to evaluate:</div>
<div class="sub"><span class="al">(a)</span> the client's immediate situation;</div>
<div class="sub"><span class="al">(b)</span> the client's reaction to the intervention;</div>
<div class="sub"><span class="al">(c)</span> the client's medical and behavioral condition; and</div>
<div class="sub"><span class="al">(d)</span> the need to continue or terminate the restraint or seclusion.</div>
<div class="sub"><span class="al">(9)</span> Each original order and renewal order authorizing the use of restraint or seclusion is limited to eight hours, up to a total of 24 hours. After 24 hours and before writing a new order, a licensed health care practitioner must see and assess the client.</div>
<div class="sub"><span class="al">(10)</span> Staff must provide clients in restraint or seclusion with constant in-person observation for the first hour; after the first hour in-person observation can be replaced by audio and visual equipment according to facility policy.</div>
<div class="sub"><span class="al">(11)</span> Restraint or seclusion must be discontinued at the earliest possible time, regardless of the length of time identified in the order.</div>
<div class="sub"><span class="al">(12)</span> A licensed health care professional must monitor the condition of the client who is restrained or secluded at an interval determined by facility policy.</div>
<div class="sub"><span class="al">(13)</span> Each incident of restraint or seclusion must be documented in the client's medical record and must include:</div>
<div class="sub"><span class="al">(a)</span> each order and renewal order;</div>
<div class="sub"><span class="al">(b)</span> the one-hour face-to-face medical and behavioral evaluation;</div>
<div class="sub"><span class="al">(c)</span> a description of the client's behavior and the intervention used;</div>
<div class="sub"><span class="al">(d)</span> start and end times of the restraint or seclusion and the names of staff implementing interventions;</div>
<div class="sub"><span class="al">(e)</span> alternatives or other less restrictive interventions attempted, as applicable;</div>
<div class="sub"><span class="al">(f)</span> the client's condition or symptom(s) that warranted the use of restraint or seclusion;</div>
<div class="sub"><span class="al">(g)</span> the client's response to the intervention(s) used, including the rationale for continued use of the intervention; and</div>
<div class="sub"><span class="al">(h)</span> monitoring of the client in restraint or seclusion as required by facility policy.</div>
<div class="sub"><span class="al">(14)</span> Staff must be trained and able to demonstrate competency in the application of restraints, implementation of seclusion, monitoring, assessment, and providing care for a client in restraint or seclusion. The training must include:</div>
<div class="sub"><span class="al">(a)</span> techniques to identify staff and client behaviors, events, and environmental factors that may trigger circumstances that require the use of a restraint or seclusion;</div>
<div class="sub"><span class="al">(b)</span> the use of nonphysical interventions skills;</div>
<div class="sub"><span class="al">(c)</span> choosing the least restrictive interventions based on an individual assessment of the client's medical or behavioral status or condition;</div>
<div class="sub"><span class="al">(d)</span> the safe application and use of all types of restraint or seclusion used in the facility, including training in how to recognize and respond to signs of physical and psychological distress; and</div>
<div class="sub"><span class="al">(e)</span> clinical identification of specific behavioral changes that indicate restraint or seclusion is no longer necessary.</div>
<div class="sub"><span class="al">(15)</span> Staff must receive training prior to performing any actions specified in this rule and annually thereafter.</div>
<div class="sub"><span class="al">(16)</span> An FMHF must document in the staff personnel records that training and demonstration of competency was successfully completed.</div>
<div class="sub"><span class="al">(17)</span> The use of simultaneous restraint and seclusion is prohibited.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1618",cite:"ARM 37.106.1618",title:"Staffing Requirements",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> Employees of a forensic mental health facility (FMHF) must be 18 years of age and possess a high school diploma or general equivalency diploma (GED) at a minimum.</div>
<div class="sub"><span class="al">(2)</span> Employees must receive orientation and training in areas relevant to the employee's duties and responsibilities including:</div>
<div class="sub"><span class="al">(a)</span> an overview of the FMHF policy and procedure manual in areas relevant to the employee job responsibilities;</div>
<div class="sub"><span class="al">(b)</span> a review of the employee job description;</div>
<div class="sub"><span class="al">(c)</span> services provided by the facility;</div>
<div class="sub"><span class="al">(d)</span> rights of persons served;</div>
<div class="sub"><span class="al">(e)</span> safety and emergency response procedures;</div>
<div class="sub"><span class="al">(f)</span> basic first aid; and</div>
<div class="sub"><span class="al">(g)</span> certification in cardiopulmonary resuscitation (CPR).</div>
<div class="sub"><span class="al">(3)</span> All direct-care staff must receive full orientation before providing direct client care or treatment. In addition to meeting these requirements, direct-care staff must be trained to perform the services established in each client's treatment plan.</div>
<div class="sub"><span class="al">(4)</span> CPR certification must be kept current.</div>
<div class="sub"><span class="al">(5)</span> Direct-care staff must have knowledge of each client's needs and any events about which the employee should notify the administrator or the administrator's designated representative.</div>
<div class="sub"><span class="al">(6)</span> An FMHF must have a sufficient number of qualified staff on duty 24 hours a day to meet the scheduled and unscheduled needs of each client, to respond in emergency situations, and to provide all related services including:</div>
<div class="sub"><span class="al">(a)</span> maintenance of order, safety, and cleanliness;</div>
<div class="sub"><span class="al">(b)</span> assistance with medication regimens;</div>
<div class="sub"><span class="al">(c)</span> preparation and service of meals;</div>
<div class="sub"><span class="al">(d)</span> housekeeping services and assistance with laundry; and</div>
<div class="sub"><span class="al">(e)</span> assurance that each client receives the supervision and care required by the treatment plan.</div>
<div class="sub"><span class="al">(7)</span> Site-based supervisors must be on-duty 24 hours a day, seven days per week.</div>
<div class="sub"><span class="al">(8)</span> An FMHF must be staffed by a registered nurse (RN) 24 hours a day, seven days per week. The RN may also serve as a supervisor.</div>
<div class="sub"><span class="al">(9)</span> An FMHF must provide access to ancillary services such as laboratory or radiological services directly or by contracting with a facility licensed to provide such services.</div>
<div class="sub"><span class="al">(10)</span> An FMHF must employ at least one licensed health care practitioner to monitor and evaluate the client's medical and psychiatric treatment. At all times, a licensed health care practitioner must be on duty or on call and available physically to the facility within one hour. The licensed health care practitioner may also be the medical director.</div>
<div class="sub"><span class="al">(11)</span> An FMHF must have a sufficient number of qualified licensed mental health professionals on staff to meet the needs of the clients as outlined in facility policies and the clients' individualized treatment plans.</div>
<div class="sub"><span class="al">(12)</span> An individual on each work shift must have keys to all relevant client care areas and access to all items needed to provide appropriate client treatment and care.</div>
<div class="sub"><span class="al">(13)</span> An FMHF must provide ongoing staff training a minimum of 20 hours annually.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1621",cite:"ARM 37.106.1621",title:"Client Admission",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> A forensic mental health facility (FMHF) must develop and implement a written policy regarding admission into the facility for the persons identified in ARM 37.106.1602. The policy must include a screening process to identify and exclude from admission persons who need a hospital level of care.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1622",cite:"ARM 37.106.1622",title:"Client Discharge and Transfer",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> A forensic mental health facility (FMHF) must develop and implement a discharge and transfer policy for discharging a client from the FMHF to another facility.</div>
<div class="sub"><span class="al">(2)</span> The policy must include procedures for secure transportation of clients.</div>
<div class="sub"><span class="al">(3)</span> The facility must ensure coordinated transfers with other licensed health care facilities or correctional facilities.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1623",cite:"ARM 37.106.1623",title:"Client Rights and Grievances",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> Clients admitted to a forensic mental health facility (FMHF) must be afforded all of the rights provided for persons admitted to a mental health facility in Title 53, chapter 21, part 1, MCA.</div>
<div class="sub"><span class="al">(2)</span> A copy of these rights must be posted in each secure unit of the facility.</div>
<div class="sub"><span class="al">(3)</span> These rights must also be explained at the time of admission to the client in terms that the client can understand.</div>
<div class="sub"><span class="al">(4)</span> An FMHF must develop a written client grievance policy to include:</div>
<div class="sub"><span class="al">(a)</span> procedures for the submission of client's written or verbal grievance to the FMHF;</div>
<div class="sub"><span class="al">(b)</span> time frames in which the FMHF must review a grievance and reach a decision;</div>
<div class="sub"><span class="al">(c)</span> a process for providing the client with written notice of the decision that contains:</div>
<div class="sub"><span class="al">(i)</span> the name of the facility contact person;</div>
<div class="sub"><span class="al">(ii)</span> the steps taken on behalf of the client to investigate the grievance;</div>
<div class="sub"><span class="al">(iii)</span> the results of the grievance process; and</div>
<div class="sub"><span class="al">(iv)</span> the date of completion.</div>`,
  history:"AUTH: 50-5-103, MCA; IMP: 50-5-103, 50-5-204, MCA · NEW, 2016 MAR p. 144, Eff. 1/23/2016"},

  {id:"a1624",cite:"ARM 37.106.1624",title:"Food Service",meta:"ARM 37.106.16 · FMHF",
  content:`<div class="sub"><span class="al">(1)</span> A forensic mental facility (FMHF) must establish and maintain standards relative to food sources, refrigeration, refuse handling, pest control, storage, preparation, procuring, serving, handling food, and dish washing procedures that are sufficient to prevent food spoilage and the transmission of infectious disease. These standards must include the following:</div>
<div class="sub"><span class="al">(a)</span> a requirement that food must be obtained from sources that comply with all laws relating to food and food labeling;</div>
<div class="sub"><span class="al">(b)</span> a prohibition of the use of home-canned foods;</div>
<div class="sub"><span class="al">(c)</span> a requirement that food subject to spoilage is removed from its original container and kept sealed, labeled, and dated.</div>
