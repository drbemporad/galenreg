<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" fill="url(#bg)"/>

  <!-- Outer border rounded rect -->
  <rect x="8" y="8" width="176" height="176" rx="22" ry="22"
        fill="none" stroke="#4a8ab8" stroke-width="6"/>

  <!-- Inner accent border -->
  <rect x="16" y="16" width="160" height="160" rx="16" ry="16"
        fill="none" stroke="#4a8ab8" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- FMHF -->
  <text x="96" y="102"
        text-anchor="middle" dominant-baseline="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-weight="700"
        font-size="58"
        letter-spacing="2"
        fill="#e8f4ff">FMHF</text>

  <!-- Divider -->
  <line x1="44" y1="122" x2="148" y2="122"
        stroke="#4a8ab8" stroke-width="2.5"/>

  <!-- Regs -->
  <text x="96" y="152"
        text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="34"
        fill="#7ab8d8">Regs</text>
</svg>
